// ─── PILLAR BALANCE RADAR ───
function PillarRadar({ state, tasks, th }) {
  const catKeys = ["person", "people", "process", "product"];
  const catLabels = ["Person", "People", "Process", "Product"];
  const catColors = ["#DC2626", "#7C3AED", "#16A34A", th.blue];
  const values = catKeys.map(k => {
    const a = (tasks[k]?.sections || []).flatMap(s => s.tasks);
    const d = a.filter(t => t.type === "check" ? state.completed?.[t.id] : (state.counters?.[t.id] || 0) >= (t.target || 1)).length;
    return a.length > 0 ? d / a.length : 0;
  });
  const cx = 100, cy = 100, r = 70;
  const angles = values.map((_, i) => (Math.PI * 2 * i / 4) - Math.PI / 2);
  const gridLevels = [0.25, 0.5, 0.75, 1.0];
  const pointsStr = (scale) => values.map((v, i) => {
    const val = v * scale * r;
    return `${cx + val * Math.cos(angles[i])},${cy + val * Math.sin(angles[i])}`;
  }).join(" ");
  return (
    <div style={{ ...glassStyle(th), padding: "20px", marginBottom: 16 }}>
      <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", marginBottom: 14 }}>PILLAR BALANCE</div>
      <svg viewBox="0 0 200 200" width="100%" style={{ maxWidth: 260, display: "block", margin: "0 auto" }}>
        {gridLevels.map(lvl => (
          <polygon key={lvl} points={angles.map(a => `${cx + r * lvl * Math.cos(a)},${cy + r * lvl * Math.sin(a)}`).join(" ")}
            fill="none" stroke={th.ghost} strokeWidth="0.5" />
        ))}
        {angles.map((a, i) => (
          <g key={i}>
            <line x1={cx} y1={cy} x2={cx + r * Math.cos(a)} y2={cy + r * Math.sin(a)} stroke={th.ghost} strokeWidth="0.5" />
            <text x={cx + (r + 14) * Math.cos(a)} y={cy + (r + 14) * Math.sin(a)} textAnchor="middle" dominantBaseline="middle"
              fill={catColors[i]} fontSize="8" fontWeight="700" fontFamily="JetBrains Mono, monospace">{catLabels[i]}</text>
          </g>
        ))}
        <polygon points={pointsStr(1)} fill={th.blue + "20"} stroke={th.blue} strokeWidth="1.5" />
        {values.map((v, i) => (
          <circle key={i} cx={cx + v * r * Math.cos(angles[i])} cy={cy + v * r * Math.sin(angles[i])} r="4"
            fill={catColors[i]} stroke="#fff" strokeWidth="1" />
        ))}
      </svg>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginTop: 12 }}>
        {catKeys.map((k, i) => (
          <div key={k} style={{ fontSize: 10, color: th.mid, display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 8, height: 8, borderRadius: 4, background: catColors[i] }} />
            <span style={{ fontWeight: 600 }}>{Math.round(values[i] * 100)}%</span> {catLabels[i]}
          </div>
        ))}
      </div>
    </div>
  );
}

  const avgPct = hist.length > 0 ? Math.round(hist.reduce((s, d) => s + (d?.pct || 0), 0) / hist.length) : 0;
  const bestDay = hist.reduce((best, d) => (d?.pct || 0) > (best?.pct || 0) ? d : best, hist[0]);
  const catKeys = ["person", "people", "process", "product"];
  const catLabels = { person: "Person", people: "People", process: "Process", product: "Product" };
  const catColors = { person: "#DC2626", people: "#7C3AED", process: "#16A34A", product: th.blue };

    catAvgs[k] = vals.length > 0 ? Math.round(vals.reduce((s, v) => s + v, 0) / vals.length) : 0;

const PRAYER_KEY = "pva_prayer_journal";
function loadPrayers() {
  try { return JSON.parse(localStorage.getItem(PRAYER_KEY) || "[]"); } catch { return []; }
}
function savePrayers(p) {
  try { localStorage.setItem(PRAYER_KEY, JSON.stringify(p)); } catch {}
}

function PrayerJournalView({ th, onBack }) {
  const [prayers, setPrayers] = useState(loadPrayers);
  const [newText, setNewText] = useState("");
  const [filter, setFilter] = useState("all");

  const addPrayer = () => {
    if (!newText.trim()) return;
    const p = { id: Date.now(), text: newText.trim(), status: "ongoing", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    const next = [p, ...prayers];
    setPrayers(next); savePrayers(next); setNewText("");
  };
  const updateStatus = (id, status) => {
    const next = prayers.map(p => p.id === id ? { ...p, status, updatedAt: new Date().toISOString() } : p);
    setPrayers(next); savePrayers(next);
  };
  const removePrayer = (id) => {
    const next = prayers.filter(p => p.id !== id);
    setPrayers(next); savePrayers(next);
  };

  const filtered = filter === "all" ? prayers : prayers.filter(p => p.status === filter);
  const statusColors = { ongoing: th.blue, waiting: th.gold, answered: "#22C55E" };
  const statusLabels = { ongoing: "ONGOING", waiting: "WAITING", answered: "ANSWERED" };

      border: `1px solid ${filter === v ? th.blue + "40" : th.glassBorder}`,

    <div style={{ padding: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>

        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: th.text, letterSpacing: "-0.03em" }}>Prayer Journal</div>
          <div style={{ fontSize: 10, color: th.dim }}>Log, track, and celebrate answered prayers</div>
        </div>
      </div>

      {/* Add Prayer */}
      <div style={{ ...glassStyle(th), padding: "14px", marginBottom: 16 }}>
        <textarea value={newText} onChange={e => setNewText(e.target.value)} placeholder="Write your prayer request..." style={{
          width: "100%", padding: "12px", borderRadius: 10, border: `1px solid ${th.glassBorder}`, background: th.glass,
          color: th.text, fontSize: 12, fontFamily: FONT, outline: "none", minHeight: 60, resize: "vertical", boxSizing: "border-box",
        }} />
        <button onClick={addPrayer} style={{
          width: "100%", padding: "10px", marginTop: 8, borderRadius: 10, border: `1px solid ${th.blue}30`,
          background: th.blueDim, color: th.blue, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
        }}>ADD PRAYER</button>
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {filterBtn("all", "All")}{filterBtn("ongoing", "Ongoing")}{filterBtn("waiting", "Waiting")}{filterBtn("answered", "Answered")}
      </div>

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
        {[
          { label: "TOTAL", value: prayers.length, color: th.mid },
          { label: "ONGOING", value: prayers.filter(p => p.status === "ongoing").length, color: th.blue },
          { label: "ANSWERED", value: prayers.filter(p => p.status === "answered").length, color: "#22C55E" },

          <div key={s.label} style={{ ...glassStyle(th), padding: "10px 0", textAlign: "center" }}>

const VERSE_MEM_KEY = "pva_verse_mem";
function loadMemVerses() {
  try { return JSON.parse(localStorage.getItem(VERSE_MEM_KEY) || "[]"); } catch { return []; }
}
function saveMemVerses(v) {
  try { localStorage.setItem(VERSE_MEM_KEY, JSON.stringify(v)); } catch {}
}

function VerseMemView({ th, onBack }) {
  const [verses, setVerses] = useState(loadMemVerses);
  const [newRef, setNewRef] = useState("");
  const [newText, setNewText] = useState("");
  const [practicing, setPracticing] = useState(null);
  const [showText, setShowText] = useState(false);

  const addVerse = () => {
    if (!newRef.trim() || !newText.trim()) return;
    const v = { id: Date.now(), ref: newRef.trim(), text: newText.trim(), level: 0, lastReviewed: null, nextReview: new Date().toISOString(), reviews: 0 };
    const next = [v, ...verses];
    setVerses(next); saveMemVerses(next); setNewRef(""); setNewText("");
  };
  const reviewVerse = (id, remembered) => {
    const next = verses.map(v => {
      if (v.id !== id) return v;
      const newLevel = remembered ? Math.min(v.level + 1, 5) : Math.max(v.level - 1, 0);
      const intervals = [1, 2, 4, 7, 14, 30]; // spaced repetition intervals in days
      const nextDate = new Date(); nextDate.setDate(nextDate.getDate() + intervals[newLevel]);
      return { ...v, level: newLevel, lastReviewed: new Date().toISOString(), nextReview: nextDate.toISOString(), reviews: v.reviews + 1 };
    });
    setVerses(next); saveMemVerses(next); setPracticing(null); setShowText(false);
  };
  const removeVerse = (id) => {
    const next = verses.filter(v => v.id !== id);
    setVerses(next); saveMemVerses(next);
  };

  const dueVerses = verses.filter(v => new Date(v.nextReview) <= new Date());
  const levelColors = ["#EF4444", "#F59E0B", "#3B82F6", "#8B5CF6", "#22C55E", "#10B981"];
  const levelNames = ["New", "Learning", "Familiar", "Known", "Strong", "Mastered"];

  return (
    <div style={{ padding: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
        <button onClick={onBack} style={{ width: 40, height: 40, borderRadius: 12, cursor: "pointer", border: `1px solid ${th.glassBorder}`, background: th.glass, color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT, backdropFilter: "blur(20px)" }}>{"\u2190"}</button>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: th.text, letterSpacing: "-0.03em" }}>Verse Memorisation</div>
          <div style={{ fontSize: 10, color: th.dim }}>Hide the Word in your heart</div>
        </div>
      </div>

      {/* Practice Mode */}
      {practicing && (
        <div style={{ ...glassStyle(th), padding: "20px", marginBottom: 16, textAlign: "center" }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", marginBottom: 12 }}>PRACTICE</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: th.scripture || th.text, marginBottom: 16 }}>{practicing.ref}</div>
          {showText ? (
            <div style={{ fontSize: 13, color: th.text, lineHeight: 1.8, fontFamily: FONT, marginBottom: 16, fontStyle: "normal" }}>{"\u201C"}{practicing.text}{"\u201D"}</div>
          ) : (
            <button onClick={() => setShowText(true)} style={{ padding: "10px 20px", borderRadius: 10, border: `1px solid ${th.glassBorder}`, background: th.glass, color: th.mid, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT, marginBottom: 16 }}>REVEAL VERSE</button>
          )}
          <div style={{ fontSize: 11, color: th.dim, marginBottom: 12 }}>Did you remember it?</div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
            <button onClick={() => reviewVerse(practicing.id, true)} style={{ padding: "10px 20px", borderRadius: 10, border: `1px solid #22C55E40`, background: "rgba(34,197,94,0.1)", color: "#22C55E", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>YES</button>
            <button onClick={() => reviewVerse(practicing.id, false)} style={{ padding: "10px 20px", borderRadius: 10, border: `1px solid ${th.red}40`, background: th.redDim, color: th.red, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>NOT YET</button>
          </div>
        </div>
      )}

      {/* Due for Review */}
      {dueVerses.length > 0 && !practicing && (
        <div style={{ ...glassStyle(th), padding: "14px", marginBottom: 16, border: `1px solid ${th.gold}30` }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: th.gold, letterSpacing: "0.14em", marginBottom: 8 }}>{dueVerses.length} VERSE{dueVerses.length > 1 ? "S" : ""} DUE FOR REVIEW</div>
          <button onClick={() => { setPracticing(dueVerses[0]); setShowText(false); }} style={{
            width: "100%", padding: "10px", borderRadius: 10, border: `1px solid ${th.gold}30`, background: th.goldDim, color: th.gold,
            fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
          }}>START REVIEW</button>
        </div>
      )}

      {/* Add Verse */}
      <div style={{ ...glassStyle(th), padding: "14px", marginBottom: 16 }}>
        <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", marginBottom: 8 }}>ADD VERSE</div>
        <input value={newRef} onChange={e => setNewRef(e.target.value)} placeholder="Reference (e.g. John 3:16)" style={{
          width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${th.glassBorder}`, background: th.glass,
          color: th.text, fontSize: 12, fontFamily: FONT, outline: "none", marginBottom: 6, boxSizing: "border-box",
        }} />
        <textarea value={newText} onChange={e => setNewText(e.target.value)} placeholder="Type the verse text..." style={{
          width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${th.glassBorder}`, background: th.glass,
          color: th.text, fontSize: 12, fontFamily: FONT, outline: "none", minHeight: 60, resize: "vertical", boxSizing: "border-box",
        }} />
        <button onClick={addVerse} style={{
          width: "100%", padding: "10px", marginTop: 8, borderRadius: 10, border: `1px solid ${th.blue}30`,
          background: th.blueDim, color: th.blue, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
        }}>ADD TO MEMORY BANK</button>
      </div>

      {/* Verse List */}
      {verses.map(v => (
        <div key={v.id} style={{ ...glassStyle(th), padding: "14px", marginBottom: 8 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 12, fontWeight: 700, color: th.scripture || th.text }}>{v.ref}</span>
            <span style={{ fontSize: 9, fontWeight: 700, color: levelColors[v.level], padding: "2px 8px", borderRadius: 6, background: levelColors[v.level] + "15" }}>{levelNames[v.level]}</span>
          </div>
          <div style={{ fontSize: 11, color: th.dim, lineHeight: 1.5, marginBottom: 8 }}>{v.text.slice(0, 80)}{v.text.length > 80 ? "..." : ""}</div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 9, color: th.ghost }}>{v.reviews} reviews</span>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => { setPracticing(v); setShowText(false); }} style={{ padding: "4px 10px", borderRadius: 6, border: `1px solid ${th.blue}30`, background: th.blueDim, color: th.blue, fontSize: 9, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>PRACTICE</button>
              <button onClick={() => removeVerse(v.id)} style={{ background: "none", border: "none", color: th.dim, fontSize: 11, cursor: "pointer" }}>{"\u2715"}</button>
            </div>
          </div>
        </div>
      ))}
      {verses.length === 0 && <div style={{ textAlign: "center", color: th.dim, fontSize: 12, padding: 30, fontStyle: "normal" }}>No verses yet. Add your first verse above!</div>}
    </div>
  );
}

// ─── TEMPLE BUILDING VISUAL ───
function TempleBuildingVisual({ state, th }) {
  const hist = state.history || [];
  const last14 = hist.slice(-14);
  const completedDays = last14.filter(d => (d?.pct || 0) >= 50).length;
  const missedDays = last14.filter(d => (d?.pct || 0) < 50).length;
  const totalBricks = 14;
  const rows = 7;
  const bricksPerRow = 2;
  const brickW = 28, brickH = 10, gap = 2;
  const baseY = 100;
  const baseX = 50 - ((bricksPerRow * brickW + (bricksPerRow - 1) * gap) / 2);

  return (
    <div style={{ ...glassStyle(th), padding: "16px", marginBottom: 16 }}>
      <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", marginBottom: 10 }}>YOUR TEMPLE</div>
      <svg viewBox="0 0 100 120" width="100%" style={{ maxWidth: 200, display: "block", margin: "0 auto" }}>
        {/* Foundation */}
        <rect x="10" y={baseY + 2} width="80" height="6" rx="2" fill={th.gold} opacity="0.3" />
        {/* Bricks */}
        {Array.from({ length: totalBricks }).map((_, i) => {
          const row = Math.floor(i / bricksPerRow);
          const col = i % bricksPerRow;
          const x = baseX + col * (brickW + gap);
          const y = baseY - (row + 1) * (brickH + gap);
          const isBuilt = i < completedDays;
          const isCracked = !isBuilt && i < completedDays + missedDays;
          return (
            <g key={i}>
              <rect x={x} y={y} width={brickW} height={brickH} rx="2"
                fill={isBuilt ? th.gold : isCracked ? th.red + "30" : th.ghost}
                stroke={isBuilt ? th.gold : isCracked ? th.red + "50" : th.ghost}
                strokeWidth="0.5" opacity={isBuilt ? 0.8 : 0.3} />
              {isCracked && (
                <line x1={x + 5} y1={y + 2} x2={x + brickW - 5} y2={y + brickH - 2}
                  stroke={th.red} strokeWidth="0.8" opacity="0.5" />
              )}
            </g>
          );
        })}
        {/* Roof / pinnacle if mostly complete */}
        {completedDays >= 10 && (
          <polygon points={`${50},${baseY - rows * (brickH + gap) - 15} ${baseX - 2},${baseY - rows * (brickH + gap) + 2} ${baseX + bricksPerRow * brickW + (bricksPerRow - 1) * gap + 2},${baseY - rows * (brickH + gap) + 2}`}
            fill={th.gold} opacity="0.4" />
        )}
        {/* Glow if strong */}
        {completedDays >= 12 && (
          <circle cx="50" cy={baseY - rows * (brickH + gap) - 10} r="8" fill={th.gold} opacity="0.15">
            <animate attributeName="r" values="6;10;6" dur="3s" repeatCount="indefinite" />
          </circle>
        )}
      </svg>
      <div style={{ textAlign: "center", marginTop: 8 }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: th.gold }}>{completedDays}</span>
        <span style={{ fontSize: 10, color: th.dim }}> / {totalBricks} stones laid</span>
        {missedDays > 0 && <span style={{ fontSize: 10, color: th.red, marginLeft: 8 }}>{missedDays} cracked</span>}
      </div>
    </div>
  );
}

function savePets(p) { try { localStorage.setItem(PETS_KEY, JSON.stringify(p)); } catch {} }

function getPillarStreaks(history) {
  const streaks = { person: 0, people: 0, process: 0, product: 0 };
  const hist = [...(history || [])].reverse();
  const catKeys = ["person", "people", "process", "product"];
  catKeys.forEach(k => {
    for (const d of hist) {
      if ((d?.cats?.[k] || 0) >= 50) streaks[k]++;
      else break;
    }
  });
  return streaks;
}

function PetsView({ state, th, onBack }) {
  const [pets, setPets] = useState(loadPets);
  const pillarStreaks = getPillarStreaks(state.history);
  const overallStreak = state.streak || 0;
  const catKeys = ["person", "people", "process", "product"];
  const catLabels = { person: "Person", people: "People", process: "Process", product: "Product" };
  const catColors = { person: "#DC2626", people: "#7C3AED", process: "#16A34A", product: "#3B82F6" };

  const unlock = (petName) => {
    if (pets.unlocked.includes(petName)) return;
    const next = { ...pets, unlocked: [...pets.unlocked, petName] };
    setPets(next); savePets(next);
  };
  const setActive = (petName) => {
    const next = { ...pets, active: pets.active === petName ? null : petName };
    setPets(next); savePets(next);
  };
  const setActiveMount = (mountName) => {
    const next = { ...pets, activeMount: pets.activeMount === mountName ? null : mountName };
    setPets(next); savePets(next);
  };

  // Auto-unlock earned pets
  useEffect(() => {
    let changed = false;
    const next = { ...pets, unlocked: [...pets.unlocked] };
    catKeys.forEach(k => {
      PET_LINES[k].forEach(pet => {
        if (pillarStreaks[k] >= pet.req && !next.unlocked.includes(pet.name)) {
          next.unlocked.push(pet.name); changed = true;
        }
      });
    });
    MOUNT_UNLOCKS.forEach(m => {
      if (overallStreak >= m.req && !next.unlocked.includes(m.name)) {
        next.unlocked.push(m.name); changed = true;
      }
    });
    if (changed) { setPets(next); savePets(next); }
  }, []);

  return (
    <div style={{ padding: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
        <button onClick={onBack} style={{ width: 40, height: 40, borderRadius: 12, cursor: "pointer", border: `1px solid ${th.glassBorder}`, background: th.glass, color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT, backdropFilter: "blur(20px)" }}>{"\u2190"}</button>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: th.text, letterSpacing: "-0.03em" }}>Pets & Mounts</div>
          <div style={{ fontSize: 10, color: th.dim }}>Companions earned through consistency</div>
        </div>
      </div>

      {/* Active companion display */}
      {pets.active && (() => {
        let found = null;
        catKeys.forEach(k => { PET_LINES[k].forEach(p => { if (p.name === pets.active) found = p; }); });
        return found ? (
          <div style={{ ...glassStyle(th), padding: "20px", marginBottom: 16, textAlign: "center" }}>
            <div style={{ fontSize: 40 }}>{found.icon}</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: th.text, marginTop: 6 }}>{found.name}</div>
            <div style={{ fontSize: 9, color: th.dim, marginTop: 2 }}>Active Companion</div>
          </div>
        ) : null;
      })()}

      {/* Pillar creatures */}
      {catKeys.map(k => (
        <div key={k} style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: catColors[k], letterSpacing: "0.14em", marginBottom: 8 }}>{catLabels[k].toUpperCase()} COMPANIONS <span style={{ color: th.dim }}>({pillarStreaks[k]}d streak)</span></div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            {PET_LINES[k].map(pet => {
              const unlocked = pets.unlocked.includes(pet.name);
              const isActive = pets.active === pet.name;
              return (
                <div key={pet.name} onClick={() => unlocked && setActive(pet.name)} style={{
                  ...glassStyle(th), padding: "14px 8px", textAlign: "center", cursor: unlocked ? "pointer" : "default",
                  opacity: unlocked ? 1 : 0.4, border: isActive ? `2px solid ${catColors[k]}` : `1px solid ${th.glassBorder}`,
                }}>
                  <div style={{ fontSize: 24 }}>{unlocked ? pet.icon : "\u{1F512}"}</div>
                  <div style={{ fontSize: 9, fontWeight: 700, color: th.text, marginTop: 4 }}>{pet.name}</div>
                  <div style={{ fontSize: 8, color: th.dim, marginTop: 2 }}>{pet.desc}</div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* Mounts */}
      <div style={{ fontSize: 9, fontWeight: 700, color: th.gold, letterSpacing: "0.14em", marginBottom: 8 }}>LEGENDARY MOUNTS <span style={{ color: th.dim }}>({overallStreak}d streak)</span></div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
        {MOUNT_UNLOCKS.map(m => {
          const unlocked = pets.unlocked.includes(m.name);
          const isActive = pets.activeMount === m.name;
          return (
            <div key={m.name} onClick={() => unlocked && setActiveMount(m.name)} style={{
              ...glassStyle(th), padding: "16px", textAlign: "center", cursor: unlocked ? "pointer" : "default",
              opacity: unlocked ? 1 : 0.4, border: isActive ? `2px solid ${th.gold}` : `1px solid ${th.glassBorder}`,
            }}>
              <div style={{ fontSize: 28 }}>{unlocked ? m.icon : "\u{1F512}"}</div>
              <div style={{ fontSize: 10, fontWeight: 700, color: th.text, marginTop: 4 }}>{m.name}</div>
              <div style={{ fontSize: 8, color: th.dim, marginTop: 2 }}>{m.desc}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const GUILD_KEY = "pva_guild";
function loadGuild() {
  try { return JSON.parse(localStorage.getItem(GUILD_KEY) || "null"); } catch { return null; }
}
function saveGuild(g) { try { localStorage.setItem(GUILD_KEY, JSON.stringify(g)); } catch {} }

const GUILD_BOSSES = [
  { name: "Spirit of Sloth", hp: 500, icon: "\u{1F9DF}", reward: 200 },
  { name: "Giant of Distraction", hp: 750, icon: "\u{1F47E}", reward: 300 },
  { name: "Dragon of Procrastination", hp: 1000, icon: "\u{1F432}", reward: 500 },
  { name: "Leviathan of Compromise", hp: 1500, icon: "\u{1F40D}", reward: 750 },
  { name: "Behemoth of Complacency", hp: 2000, icon: "\u{1F43B}", reward: 1000 },
];

function GuildView({ state, th, dayPct, onBack }) {
  const [guild, setGuild] = useState(() => loadGuild() || {
    name: "", members: [], boss: GUILD_BOSSES[0], bossHp: GUILD_BOSSES[0].hp,
    bossMaxHp: GUILD_BOSSES[0].hp, bossIdx: 0, log: [], created: false,
  });
  const [newMember, setNewMember] = useState("");
  const [guildName, setGuildName] = useState(guild.name || "");

  const save = (g) => { setGuild(g); saveGuild(g); };

  const createGuild = () => {
    if (!guildName.trim()) return;
    const g = { ...guild, name: guildName.trim(), created: true };
    save(g);
  };
  const addMember = () => {
    if (!newMember.trim()) return;
    const member = { id: Date.now(), name: newMember.trim(), hp: 100, contribution: 0 };
    save({ ...guild, members: [...guild.members, member] });
    setNewMember("");
  };
  const removeMember = (id) => save({ ...guild, members: guild.members.filter(m => m.id !== id) });

  const attackBoss = () => {
    const damage = Math.round(dayPct * 2 + (state.streak || 0) * 3);
    const newHp = Math.max(0, guild.bossHp - damage);
    const logEntry = { text: `You dealt ${damage} damage!`, time: new Date().toLocaleTimeString(), type: "attack" };
    let g = { ...guild, bossHp: newHp, log: [logEntry, ...guild.log.slice(0, 19)] };
    if (newHp <= 0) {
      const nextIdx = (guild.bossIdx + 1) % GUILD_BOSSES.length;
      const nextBoss = GUILD_BOSSES[nextIdx];
      g = { ...g, boss: nextBoss, bossHp: nextBoss.hp, bossMaxHp: nextBoss.hp, bossIdx: nextIdx,
        log: [{ text: `${guild.boss.name} defeated! +${guild.boss.reward} XP`, time: new Date().toLocaleTimeString(), type: "victory" }, ...g.log] };
    }
    save(g);
  };

  const simulateMissed = (memberId) => {
    const g = { ...guild,
      members: guild.members.map(m => m.id === memberId ? { ...m, hp: Math.max(0, m.hp - 15) } : m),
      log: [{ text: `${guild.members.find(m => m.id === memberId)?.name} missed tasks! Party takes damage.`, time: new Date().toLocaleTimeString(), type: "damage" }, ...guild.log.slice(0, 19)],
    };
    save(g);
  };

  const bossHpPct = guild.bossMaxHp > 0 ? (guild.bossHp / guild.bossMaxHp) * 100 : 0;
  const inputStyle = { width: "100%", padding: "10px 14px", borderRadius: 10, border: `1px solid ${th.glassBorder}`, background: th.glass, color: th.text, fontSize: 12, fontFamily: FONT, outline: "none", boxSizing: "border-box" };

  return (
    <div style={{ padding: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
        <button onClick={onBack} style={{ width: 40, height: 40, borderRadius: 12, cursor: "pointer", border: `1px solid ${th.glassBorder}`, background: th.glass, color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT, backdropFilter: "blur(20px)" }}>{"\u2190"}</button>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: th.text, letterSpacing: "-0.03em" }}>{guild.created ? guild.name : "Create a Guild"}</div>
          <div style={{ fontSize: 10, color: th.dim }}>Fight together, grow together</div>
        </div>
      </div>

      {!guild.created ? (
        <div style={{ ...glassStyle(th), padding: "20px", textAlign: "center" }}>
          <div style={{ fontSize: 30, marginBottom: 12 }}>{"\u2694\uFE0F"}</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: th.text, marginBottom: 16 }}>Name Your Guild</div>
          <input value={guildName} onChange={e => setGuildName(e.target.value)} placeholder="e.g. The Watchmen" style={{ ...inputStyle, textAlign: "center", marginBottom: 12 }} />
          <button onClick={createGuild} style={{ width: "100%", padding: "12px", borderRadius: 10, border: `1px solid ${th.blue}30`, background: th.blueDim, color: th.blue, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>CREATE GUILD</button>
        </div>
      ) : (
        <>
          {/* Boss Battle */}
          <div style={{ ...glassStyle(th), padding: "20px", marginBottom: 16, textAlign: "center" }}>
            <div style={{ fontSize: 9, fontWeight: 700, color: th.red, letterSpacing: "0.14em", marginBottom: 10 }}>GUILD BOSS</div>
            <div style={{ fontSize: 40, marginBottom: 8 }}>{guild.boss.icon}</div>
            <div style={{ fontSize: 14, fontWeight: 800, color: th.text }}>{guild.boss.name}</div>
            <div style={{ fontSize: 11, color: th.dim, marginTop: 4 }}>{guild.bossHp} / {guild.bossMaxHp} HP</div>
            <div style={{ height: 8, borderRadius: 4, background: th.ghost, marginTop: 8, overflow: "hidden" }}>
              <div style={{ height: "100%", borderRadius: 4, width: `${bossHpPct}%`, background: bossHpPct > 50 ? th.red : bossHpPct > 25 ? th.gold : "#22C55E", transition: "width 0.5s ease" }} />
            </div>
            <button onClick={attackBoss} style={{
              marginTop: 14, padding: "10px 24px", borderRadius: 10, border: `1px solid ${th.red}40`, background: th.redDim,
              color: th.red, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
            }}>{"\u2694\uFE0F"} ATTACK ({Math.round(dayPct * 2 + (state.streak || 0) * 3)} DMG)</button>
            <div style={{ fontSize: 9, color: th.dim, marginTop: 6 }}>Damage = (completion% x 2) + (streak x 3)</div>
          </div>

          {/* Party Members */}
          <div style={{ ...glassStyle(th), padding: "16px", marginBottom: 16 }}>
            <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", marginBottom: 10 }}>PARTY MEMBERS</div>
            {guild.members.map(m => (
              <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8, padding: "8px 10px", borderRadius: 10, background: th.surface }}>
                <div style={{ width: 28, height: 28, borderRadius: 14, background: m.hp > 50 ? th.blueDim : th.redDim, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: m.hp > 50 ? th.blue : th.red }}>{m.name[0]}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: th.text }}>{m.name}</div>
                  <div style={{ height: 3, borderRadius: 2, background: th.ghost, marginTop: 3, width: 60, overflow: "hidden" }}>
                    <div style={{ height: "100%", borderRadius: 2, width: `${m.hp}%`, background: m.hp > 50 ? "#22C55E" : th.red }} />
                  </div>
                </div>
                <button onClick={() => simulateMissed(m.id)} style={{ padding: "3px 8px", borderRadius: 6, border: `1px solid ${th.red}30`, background: "transparent", color: th.red, fontSize: 8, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>MISSED</button>
                <button onClick={() => removeMember(m.id)} style={{ background: "none", border: "none", color: th.dim, fontSize: 11, cursor: "pointer" }}>{"\u2715"}</button>
              </div>
            ))}
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <input value={newMember} onChange={e => setNewMember(e.target.value)} placeholder="Add member..." style={{ ...inputStyle, flex: 1 }} />
              <button onClick={addMember} style={{ padding: "8px 14px", borderRadius: 10, border: `1px solid ${th.blue}30`, background: th.blueDim, color: th.blue, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>ADD</button>
            </div>
          </div>

          {/* Battle Log */}
          <div style={{ ...glassStyle(th), padding: "16px" }}>
            <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", marginBottom: 10 }}>BATTLE LOG</div>
            {guild.log.length === 0 && <div style={{ fontSize: 11, color: th.dim, fontStyle: "normal" }}>No activity yet. Attack the boss!</div>}
            {guild.log.slice(0, 10).map((l, i) => (
              <div key={i} style={{ fontSize: 10, color: l.type === "victory" ? "#22C55E" : l.type === "damage" ? th.red : th.mid, marginBottom: 4, lineHeight: 1.5 }}>
                <span style={{ color: th.ghost, marginRight: 6 }}>{l.time}</span>{l.text}
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

            </div>

  );

// ─── CELEBRATION PARTICLES ───
function spawnParticles(e) {
  const colors = ["#3B82F6", "#F59E0B", "#22C55E", "#EF4444", "#7C3AED", "#EC4899"];
  const cx = e ? (e.clientX || window.innerWidth / 2) : window.innerWidth / 2;
  const cy = e ? (e.clientY || window.innerHeight / 2) : window.innerHeight / 2;
  for (let i = 0; i < 12; i++) {
    const p = document.createElement("div");
    p.className = "pva-particle";
    const angle = (Math.PI * 2 * i) / 12;
    const dist = 40 + Math.random() * 60;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30;
    p.style.cssText = `left:${cx}px;top:${cy}px;width:${4+Math.random()*4}px;height:${4+Math.random()*4}px;background:${colors[i%colors.length]};--dx:${dx}px;--dy:${dy}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1100);
  }
}

  const [celebrate, setCelebrate] = useState(false);
  const [showSummary, setShowSummary] = useState(false);
  const [showAccountability, setShowAccountability] = useState(false);

  // If no profile, show onboarding
  if (!profile) {
    return <OnboardingScreen onComplete={(p) => setProfile(p)} onCustomTasks={(ct) => setState(prev => ({ ...prev, customTasks: ct }))} />;
  }

  const userName = profile.name;
  const scrollRef = useRef(null);

  const th = themeMode === "dark" ? dark : light;
  const isDark = themeMode === "dark";
  const colors = catColors(th);

  // Task management
  const tasks = useMemo(() => {
    return state.customTasks || DEFAULT_TASKS;
  }, [state.customTasks]);

  const getEditableTasks = () => {
    return state.customTasks ? JSON.parse(JSON.stringify(state.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
  };

  const onEditTask = useCallback((catKey, secIdx, taskId, newLabel) => {
    setState(p => {
      const t = p.customTasks ? JSON.parse(JSON.stringify(p.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
      const sec = t[catKey]?.sections?.[secIdx];
      if (sec) { const task = sec.tasks.find(tk => tk.id === taskId); if (task) task.label = newLabel; }
      return { ...p, customTasks: t };
    });
  }, []);

  const onDeleteTask = useCallback((catKey, secIdx, taskId) => {
    setState(p => {
      const t = p.customTasks ? JSON.parse(JSON.stringify(p.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
      const sec = t[catKey]?.sections?.[secIdx];
      if (sec) sec.tasks = sec.tasks.filter(tk => tk.id !== taskId);
      const nc = { ...p.completed }; delete nc[taskId];
      return { ...p, customTasks: t, completed: nc };
    });
  }, []);

  const onAddTask = useCallback((catKey, secIdx, label) => {
    setState(p => {
      const t = p.customTasks ? JSON.parse(JSON.stringify(p.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
      const sec = t[catKey]?.sections?.[secIdx];
      if (sec) {
        const id = `custom_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
        sec.tasks.push({ id, label, xp: 15, type: "check", hasNotes: true, notesPlaceholder: "Notes..." });
      }
      return { ...p, customTasks: t };
    });
  }, []);

  // Save state and update today's history entry
  const lastSavedPct = useRef(-1);
  useEffect(() => {
    // Update history for today without triggering re-render loop
    if (dayPct !== lastSavedPct.current) {
      lastSavedPct.current = dayPct;
      const hist = [...(state.history || [])];
      if (hist.length > 0 && hist[hist.length - 1]?.date === TODAY) {
        const catKeys2 = ["person", "people", "process", "product"];
        const cats = {};
        catKeys2.forEach(k => {
          const a = (tasks[k]?.sections || []).flatMap(s => s.tasks);
          const d = a.filter(t => t.type === "check" ? state.completed?.[t.id] : (state.counters?.[t.id]||0) >= (t.target||1)).length;
          cats[k] = a.length > 0 ? Math.round((d / a.length) * 100) : 0;
        });
        hist[hist.length - 1] = { ...hist[hist.length - 1], pct: dayPct, xp: dayXp, cats };
        state.history = hist;
      }
    }
    saveState(state);
  }, [state]);
  useEffect(() => {
    if (autoTheme) {
      const id = setInterval(() => setThemeMode(getAutoTheme()), 60000);
      setThemeMode(getAutoTheme());
      return () => clearInterval(id);
    }
  }, [autoTheme]);

  const mult = getMult(state.streak);
  const { cur: level, nxt: nextLevel, idx: levelIdx } = getLevel(state.totalXp);

  const all = Object.values(tasks).flatMap(c => c.sections.flatMap(s => s.tasks));
  const doneN = all.filter(t => t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1)).length;
  const dayPct = all.length > 0 ? Math.round((doneN / all.length) * 100) : 0;
  const dayXp = all.reduce((s, t) => {
    const d = t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1);
    return s + (d ? Math.round(t.xp * mult) : 0);
  }, 0);

  // Per-category completion
  const getCatPct = (catKey) => {
    const a = tasks[catKey].sections.flatMap(s => s.tasks);
    const d = a.filter(t => t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1)).length;
    return a.length > 0 ? Math.round((d / a.length) * 100) : 0;
  };

  // Daily Challenge
  const dailyChallenge = getDailyChallenge(TODAY);
  const toggleChallenge = () => {
    setState(p => {
      const was = p.challengeCompleted; const dx = dailyChallenge.xp;
      if (!was) playTick();
      return { ...p, challengeCompleted: !was, xp: p.xp + (was ? -dx : dx), totalXp: p.totalXp + (was ? -dx : dx) };
    });
  };

  const toggleHomeTask = useCallback((id, e) => {
    const allT = Object.values(tasks).flatMap(c => c.sections.flatMap(s => s.tasks));
    setState(p => {
      const t = allT.find(x => x.id === id); const was = p.completed[id];
      const dx = t ? Math.round(t.xp * mult) : 0;
      if (!was) { playTick(); spawnParticles(e); }
      return { ...p, completed: { ...p.completed, [id]: !was }, xp: p.xp + (was ? -dx : dx), totalXp: p.totalXp + (was ? -dx : dx) };
    });
  }, [tasks, mult]);

  // Weekly Boss
  const boss = getWeeklyBoss(TODAY);

  // HP system
  useEffect(() => {
    const hour = new Date().getHours();
    if (hour >= 23 && dayPct < 100 && !state._hpDrained) {
      const missedXp = all.reduce((s, t) => {
        const d = t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1);
        return s + (d ? 0 : t.xp);
      }, 0);
      const totalXpPool = all.reduce((s,t) => s + t.xp, 0);
      const hpLoss = totalXpPool > 0 ? Math.round((missedXp / totalXpPool) * 30) : 0;
      if (hpLoss > 0) {
        playDamage();
        setState(p => {
          const newHp = Math.max(0, p.hp - hpLoss);
          return { ...p, hp: newHp, _hpDrained: true, redemptionMode: newHp <= 0 };
        });
      }
    }
    if (dayPct >= 80 && !state._hpRegen) {
      setState(p => ({ ...p, hp: Math.min(HP_MAX, p.hp + 10), _hpRegen: true }));
    }
  }, [dayPct, state._hpDrained, state._hpRegen]);

  useEffect(() => {
    if (dayPct === 100 && !celebrate) { setCelebrate(true); playCelebrate(); }
  }, [dayPct]);

  const toggleTheme = () => { setAutoTheme(false); setThemeMode(m => m === "dark" ? "light" : "dark"); };

  const openCategory = (catKey) => { setActiveCat(catKey); setView("category"); };
  const goHome = () => { setView("home"); setActiveCat(null); };

  const catKeys = ["person", "people", "process", "product"];

  return (
    <div style={{ minHeight: "100vh", fontFamily: FONT, color: th.text, background: th.grad, transition: "background 0.5s ease", position: "relative", overflow: "hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap');
        .pppp-tiles::-webkit-scrollbar { display: none; }
        .pppp-tiles { -ms-overflow-style: none; scrollbar-width: none; }

        /* Aurora animated background */
        .pva-aurora {
          position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0;
          background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(59,130,246,0.06) 0%, transparent 60%),
                      radial-gradient(ellipse 50% 50% at 80% 20%, rgba(124,58,237,0.05) 0%, transparent 60%),
                      radial-gradient(ellipse 40% 60% at 50% 90%, rgba(34,197,94,0.04) 0%, transparent 60%);
          animation: auroraShift 20s ease-in-out infinite alternate;
        }
        @keyframes auroraShift {
          0% { opacity: 0.6; transform: scale(1) translateY(0); }
          50% { opacity: 1; transform: scale(1.05) translateY(-10px); }
          100% { opacity: 0.7; transform: scale(0.98) translateY(5px); }
        }

        /* Fade-in-up page transition */
        .pva-fade-in {
          animation: pvaFadeInUp 0.35s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes pvaFadeInUp {
          from { opacity: 0; transform: translateY(14px); }
          to { opacity: 1; transform: translateY(0); }
        }

        /* Button press feedback */
        button:active, [role="button"]:active, .pva-pressable:active {
          transform: scale(0.96) !important;
          transition: transform 0.1s ease !important;
        }

        /* Pulse animation for streak */
        .pva-pulse {
          animation: pvaPulse 2s ease-in-out infinite;
        }
        @keyframes pvaPulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.08); }
        }

        /* Shimmer on progress bars */
        .pva-bar-shimmer {
          animation: pvaShimmer 2.5s ease-in-out infinite;
        }
        @keyframes pvaShimmer {
          0% { background-position: 200% 0; }
          100% { background-position: -200% 0; }
        }

        /* Celebration particles */
        .pva-particle {
          position: fixed; pointer-events: none; z-index: 9999;
          border-radius: 50%; animation: pvaParticle 1s ease-out forwards;
        }
        @keyframes pvaParticle {
          0% { opacity: 1; transform: translate(0, 0) scale(1); }
          100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
        }

        /* Card hover lift */
        .pva-card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .pva-card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
      `}</style>

      {/* Aurora gradient overlay */}
      <div className="pva-aurora" />

      {/* Redemption Mode Overlay */}
      {state.redemptionMode && <RedemptionMode state={state} setState={setState} th={th} />}

      {/* Shareable Summary */}
      {showSummary && <ShareableSummary state={state} dayPct={dayPct} dayXp={dayXp} level={level}
        levelIdx={levelIdx} th={th} onClose={() => setShowSummary(false)} />}
      {showAccountability && <AccountabilityModal state={state} dayPct={dayPct} dayXp={dayXp} level={level} th={th} onClose={() => setShowAccountability(false)} />}

      <div style={{ maxWidth: 640, margin: "0 auto", position: "relative", zIndex: 1 }}>

        {/* ─── TOP BAR ─── */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 20px 0" }}>
          <div style={{
            padding: "6px 16px", borderRadius: 20,
            background: th.glass, border: `1px solid ${th.glassBorder}`,
            backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
          }}>
            <span style={{ fontSize: 12, fontWeight: 800, color: th.text, letterSpacing: "-0.02em" }}>{userName}{"\u2019"}s PVA Model</span>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            {view !== "home" && (
              <button onClick={goHome} style={{
                padding: "6px 14px", borderRadius: 20, border: `1px solid ${th.glassBorder}`,
                background: th.glass, color: th.mid, fontSize: 11, fontWeight: 600,
                cursor: "pointer", fontFamily: FONT, backdropFilter: "blur(20px)",
              }}>HOME</button>
            )}
            <button onClick={() => setView(view === "weekly" ? "home" : "weekly")} style={{
              padding: "6px 14px", borderRadius: 20, border: `1px solid ${view === "weekly" ? th.blue + "40" : th.glassBorder}`,
              background: view === "weekly" ? th.blueDim : th.glass, color: view === "weekly" ? th.blue : th.mid,
              fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: FONT, backdropFilter: "blur(20px)",
            }}>WEEKLY</button>
            <button onClick={() => setShowAccountability(true)} style={{
              padding: "6px 14px", borderRadius: 20, border: `1px solid ${th.glassBorder}`,
              background: th.glass, color: th.mid, fontSize: 11, fontWeight: 600,
              cursor: "pointer", fontFamily: FONT, backdropFilter: "blur(20px)",
            }}>ACC</button>
            <button onClick={() => setShowSummary(true)} style={{
              padding: "6px 14px", borderRadius: 20, border: `1px solid ${th.glassBorder}`,
              background: th.glass, color: th.mid, fontSize: 11, fontWeight: 600,
              cursor: "pointer", fontFamily: FONT, backdropFilter: "blur(20px)",
            }}>SHARE</button>
            <button onClick={() => setView("settings")} style={{
              width: 36, height: 36, borderRadius: 18, border: `1px solid ${th.glassBorder}`,
              background: th.glass, color: th.mid, fontSize: 14, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
            }}>{"\u2699"}</button>
            <button onClick={toggleTheme} style={{
              width: 36, height: 36, borderRadius: 18, border: `1px solid ${th.glassBorder}`,
              background: th.glass, color: th.mid, fontSize: 14, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
            }}>{themeMode === "dark" ? "\u2600" : "\u263D"}</button>
          </div>
        </div>

        {/* ─── HOME VIEW ─── */}
        {view === "home" && (
          <div className="pva-fade-in">
            {/* Scripture + Avatar (right-aligned) */}
            <ScriptureHeader level={level} levelIdx={levelIdx} dayPct={dayPct} th={th} />

            {/* Daily Readiness */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <ReadinessCard state={state} dayPct={dayPct} th={th} />
            </div>

            {/* Stats bar */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, padding: "0 20px", marginBottom: 22 }}>
              {[
                { label: "XP", value: `${dayXp}`, color: th.blue, pulse: false },
                { label: "HP", value: `${state.hp}`, color: state.hp > 60 ? "#22C55E" : state.hp > 30 ? th.gold : th.red, pulse: false },
                { label: "TODAY", value: `${dayPct}%`, color: th.blue, pulse: false },
                { label: "STREAK", value: `${state.streak}`, color: th.red, pulse: state.streak >= 3 },
              ].map(x => (
                <div key={x.label} className={`pva-card-hover ${x.pulse ? "pva-pulse" : ""}`} style={{ ...glassStyle(th), padding: "14px 0", textAlign: "center" }}>
                  <div style={{ fontSize: 20, fontWeight: 800, color: x.color, letterSpacing: "-0.04em" }}>{x.value}</div>
                  <div style={{ fontSize: 8, color: th.dim, letterSpacing: "0.14em", marginTop: 4 }}>{x.label}</div>
                </div>
              ))}
            </div>

            {/* ─── NAV TILES ─── */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, padding: "0 20px", marginBottom: 22 }}>
              <div onClick={() => setView("pva_glance")} className="pva-card-hover" style={{
                ...glassStyle(th), padding: "20px 16px", cursor: "pointer",
                border: `1px solid ${th.blue}25`,
                background: `linear-gradient(135deg, ${th.blue}10 0%, transparent 100%)`,
                transition: "all 0.3s ease", textAlign: "center",
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: th.text, marginBottom: 4 }}>PVA AT A GLANCE</div>
                <div style={{ fontSize: 9, color: th.dim }}>Person {"\u00B7"} Vehicle {"\u00B7"} Assignment</div>
              </div>
              <div onClick={() => setView("decrees")} className="pva-card-hover" style={{
                ...glassStyle(th), padding: "20px 16px", cursor: "pointer",
                border: `1px solid ${th.red}25`,
                background: `linear-gradient(135deg, ${th.red}10 0%, transparent 100%)`,
                transition: "all 0.3s ease", textAlign: "center",
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: th.text, marginBottom: 4 }}>DECREES & DECLARATIONS</div>
                <div style={{ fontSize: 9, color: th.dim }}>Speak & Stand</div>
              </div>
              <div onClick={() => setView("intercession")} className="pva-card-hover" style={{
                ...glassStyle(th), padding: "20px 16px", cursor: "pointer",
                border: `1px solid ${th.gold}25`,
                background: `linear-gradient(135deg, ${th.gold}10 0%, transparent 100%)`,
                transition: "all 0.3s ease", textAlign: "center",
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: th.text, marginBottom: 4 }}>INTERCESSION</div>
                <div style={{ fontSize: 9, color: th.dim }}>Network of Prayer</div>
              </div>
              <div onClick={() => setView("season")} className="pva-card-hover" style={{
                ...glassStyle(th), padding: "20px 16px", cursor: "pointer",
                border: `1px solid ${th.green || "#16A34A"}25`,
                background: `linear-gradient(135deg, ${th.green || "#16A34A"}10 0%, transparent 100%)`,
                transition: "all 0.3s ease", textAlign: "center",
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: th.text, marginBottom: 4 }}>SEASON</div>
                <div style={{ fontSize: 9, color: th.dim }}>Current Focus</div>
              </div>
            </div>

            {/* ─── HORIZONTAL P TILES (centre stage) ─── */}
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: th.dim, letterSpacing: "0.14em", marginBottom: 14, padding: "0 20px" }}>THE FOUR PILLARS</div>
              <div ref={scrollRef} className="pppp-tiles" style={{
                display: "flex", gap: 16, overflowX: "auto", overflowY: "hidden",
                scrollSnapType: "x mandatory", paddingBottom: 8,
                paddingLeft: 20, paddingRight: 20,
                WebkitOverflowScrolling: "touch",
              }}>
                {catKeys.map((k, i) => (
                  <PTile key={k} catKey={k} cat={tasks[k]} index={i} pct={getCatPct(k)}
                    th={th} colors={colors} onClick={() => openCategory(k)} />
                ))}
              </div>

              {/* Daily Routine — timings from all categories with time-of-day subheadings */}
              <div style={{ padding: "12px 20px 0" }}>
                <div style={{ fontSize: 11, fontWeight: 800, color: th.dim, letterSpacing: "0.14em", marginBottom: 12 }}>MY DAILY ROUTINE</div>
                {(() => {
                  const allItems = [];
                  catKeys.forEach(k => {
                    const c = colors[k];
                    tasks[k].sections.forEach(s => {
                      s.tasks.forEach(t => {
                        allItems.push({ time: s.time, label: t.label, id: t.id, accent: c.accent, catKey: k });
                      });
                    });
                  });
                  allItems.sort((a, b) => {
                    const ta = (a.time || "99:99").replace(/\u2013/g, "-").split("-")[0].trim();
                    const tb = (b.time || "99:99").replace(/\u2013/g, "-").split("-")[0].trim();
                    return ta.localeCompare(tb);
                  });
                  const getHour = (item) => {
                    const t = (item.time || "99:99").replace(/\u2013/g, "-").split("-")[0].trim();
                    return parseInt(t.split(":")[0]) || 99;
                  };
                  const getPeriod = (item) => {
                    const h = getHour(item);
                    if (h < 12) return "MORNING";
                    if (h < 17) return "AFTERNOON";
                    if (h < 99) return "EVENING";
                    return "FLEXIBLE";
                  };
                  /* Group items by period */
                  const groups = [];
                  let currentGroup = null;
                  allItems.forEach(item => {
                    const period = getPeriod(item);
                    if (!currentGroup || currentGroup.period !== period) {
                      currentGroup = { period, items: [] };
                      groups.push(currentGroup);
                    }
                    currentGroup.items.push(item);
                  });
                  return groups.map(group => (
                    <div key={group.period} style={{
                      marginTop: 14, borderRadius: 18, overflow: "hidden",
                      ...glassStyle(th),
                      boxShadow: "0 4px 24px rgba(0,0,0,0.08), 0 1.5px 6px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.08)",
                    }}>
                      {/* Period heading */}
                      <div style={{
                        fontSize: 15, fontWeight: 800, color: th.text, letterSpacing: "0.12em",
                        fontFamily: FONT,
                        padding: "16px 20px 12px",
                        borderBottom: `1px solid ${th.glassBorder}`,
                      }}>{group.period}</div>
                      {/* Tasks within this period */}
                      <div style={{ padding: "6px 10px 10px" }}>
                        {group.items.map(item => {
                          const done = state.completed?.[item.id];
                          return (
                            <div key={item.id} onClick={(e) => toggleHomeTask(item.id, e)} style={{
                              display: "flex", alignItems: "center", gap: 12,
                              padding: "10px 10px", marginBottom: 2, borderRadius: 10,
                              background: done ? `${item.accent}08` : "transparent",
                              cursor: "pointer", transition: "all 0.2s ease",
                            }}>
                              <div style={{
                                fontSize: 10, fontWeight: 800, color: item.accent, minWidth: 80,
                                fontFamily: FONT, letterSpacing: "0.04em",
                              }}>{item.time}</div>
                              <div style={{
                                fontSize: 12, fontWeight: 500, color: done ? th.dim : th.text,
                                textDecoration: done ? "line-through" : "none",
                                flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                              }}>{item.label}</div>
                              <div style={{
                                width: 20, height: 20, borderRadius: 6, flexShrink: 0,
                                border: `1.5px solid ${done ? item.accent : th.dim}`,
                                background: done ? item.accent : "transparent",
                                display: "flex", alignItems: "center", justifyContent: "center",
                                transition: "all 0.25s ease",
                                boxShadow: done ? `0 0 10px ${item.accent}30` : "none",
                              }}>
                                {done && <span style={{ color: th.check || "#fff", fontSize: 10, fontWeight: 800 }}>{"\u2713"}</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ));
                })()}
              </div>
            </div>

            {/* ─── VERSE + REFLECTION + CHALLENGE (below routine) ─── */}
            <div style={{ padding: "0 20px", marginBottom: 20 }}>
              {/* Verse of the Day */}
              {(() => {
                const verse = getDailyVerse(TODAY);
                return (
                  <div style={{ ...glassStyle(th), padding: "18px 20px", marginBottom: 14 }}>
                    <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.16em", marginBottom: 10 }}>VERSE OF THE DAY</div>
                    <div style={{ fontSize: 12, color: th.scripture || th.text, lineHeight: 1.7, fontFamily: FONT, fontWeight: 600, fontStyle: "normal" }}>
                      {"\u201C"}{verse.text}{"\u201D"}
                    </div>
                    <div style={{ fontSize: 9, color: th.ghost, marginTop: 8, letterSpacing: "0.06em", fontFamily: FONT }}>{"\u2014"} {verse.ref} ESV</div>
                  </div>
                );
              })()}

              {/* Today's Reflection */}
              <div style={{ ...glassStyle(th), padding: "18px 20px", marginBottom: 14 }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: th.dim, letterSpacing: "0.16em", marginBottom: 10 }}>TODAY{"\u2019"}S REFLECTION</div>
                <div style={{ fontSize: 12, color: th.mid, lineHeight: 1.6, fontStyle: "normal" }}>{getDailyPrompt(TODAY)}</div>
                {state.notes?.devotional_today !== undefined ? (
                  <div style={{ fontSize: 11, color: th.text, marginTop: 8, padding: "8px 10px", borderRadius: 8, background: th.surface, lineHeight: 1.5 }}>{state.notes.devotional_today}</div>
                ) : null}
              </div>

              {/* Daily Challenge */}
              <DailyChallengeCard challenge={dailyChallenge} completed={state.challengeCompleted} onToggle={toggleChallenge} th={th} />
            </div>

            {/* XP Bar */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                <span style={{ fontSize: 10, color: th.dim }}>{state.totalXp} XP</span>
                <span style={{ fontSize: 10, color: th.ghost }}>{nextLevel ? `${nextLevel.xp} \u2192 ${nextLevel.name}` : "MAX"}</span>
              </div>
              <Bar value={state.totalXp - level.xp} max={nextLevel ? nextLevel.xp - level.xp : 1} color={th.blue} h={3} th={th} />
            </div>

            {/* Temple */}
            <div style={{ ...glassStyle(th), padding: "16px 12px 8px", margin: "0 20px 20px" }}>
              <TempleVisual stage={levelIdx} th={th} />
            </div>

            {/* Footer */}
            <div style={{ textAlign: "center", padding: "20px 0 32px" }}>
              <div style={{ fontSize: 9, color: th.ghost, letterSpacing: "0.24em" }}>PVA {"\u00B7"} {TODAY}</div>
            </div>
          </div>
        )}

        {/* ─── CATEGORY VIEW ─── */}
        {view === "category" && activeCat && tasks[activeCat] && (
          <TaskView catKey={activeCat} cat={tasks[activeCat]} state={state} setState={setState}
            mult={mult} th={th} colors={colors} onBack={goHome}
            onEditTask={onEditTask} onDeleteTask={onDeleteTask} onAddTask={onAddTask}
            dailyChallenge={dailyChallenge} challengeCompleted={state.challengeCompleted}
            toggleChallenge={toggleChallenge} />
        )}

        {/* ─── PVA GLANCE VIEW ─── */}
        {view === "pva_glance" && (
          <PVAGlanceView state={state} dayPct={dayPct} th={th} onBack={goHome} />
        )}

        {/* ─── INTERCESSION VIEW ─── */}
        {view === "intercession" && (
          <IntercessionView state={state} setState={setState} th={th} onBack={goHome} />
        )}

        {/* ─── NOTES VIEW ─── */}
        {view === "notes" && (
          <NotesView th={th} onBack={goHome} />
        )}

        {/* ─── SETTINGS VIEW ─── */}
        {view === "settings" && (
          <SettingsView profile={profile} onSave={(p) => { saveProfile(p); setProfile(p); }}
            onBack={goHome} th={th} />
        )}

        {/* ─── WEEKLY VIEW ─── */}
        {view === "weekly" && (
          <div style={{ padding: "20px" }}>
            <WeeklyView state={state} th={th} tasks={tasks} boss={boss} />
          </div>
        )}

        {/* ─── SEASON VIEW ─── */}
        {view === "season" && (
          <SeasonView state={state} tasks={tasks} dayPct={dayPct} th={th} onBack={(v) => { if (v) setView(v); else goHome(); }} />
        )}

        {/* ─── TRENDS VIEW ─── */}
        {view === "trends" && (
          <TrendsView state={state} tasks={tasks} th={th} onBack={goHome} />
        )}

        {/* ─── PRAYER JOURNAL VIEW ─── */}
        {view === "prayer_journal" && (
          <PrayerJournalView th={th} onBack={goHome} />
        )}

        {/* ─── VERSE MEMORISATION VIEW ─── */}
        {view === "verse_mem" && (
          <VerseMemView th={th} onBack={goHome} />
        )}

        {/* ─── PETS & MOUNTS VIEW ─── */}
        {view === "pets" && (
          <PetsView state={state} th={th} onBack={goHome} />
        )}

        {/* ─── GUILD VIEW ─── */}
        {view === "guild" && (
          <GuildView state={state} th={th} dayPct={dayPct} onBack={goHome} />
        )}

        {/* ─── REWARDS SHOP VIEW ─── */}
        {view === "rewards" && (
          <RewardsShopView state={state} th={th} onBack={goHome} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PPPPApp />);
</script></body></html>
