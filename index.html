// ─── SOUND ───
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
const getCtx = () => { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; };

function playTick() {
  try {
    const ctx = getCtx(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.05);
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.12);
  } catch {}
}
function playCelebrate() {
  try {
    const ctx = getCtx();
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.12);
      g.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
      o.start(ctx.currentTime + i * 0.12); o.stop(ctx.currentTime + i * 0.12 + 0.3);
    });
  } catch {}
}
function playDamage() {
  try {
    const ctx = getCtx(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(200, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.3);
    g.gain.setValueAtTime(0.12, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.3);
  } catch {}
}
function playLevelUp() {
  try {
    const ctx = getCtx();
    [440, 554, 659, 880, 1109, 1319].forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.1);
      g.gain.setValueAtTime(0.08, ctx.currentTime + i * 0.1);

}

// ─── STATE (localStorage-backed) ───
const STORAGE_KEY = "pppp_state";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const r = JSON.parse(raw || "null");
    if (r && r.date === TODAY) return r;
    if (r) {
      const prevPct = r.history?.[r.history.length - 1]?.pct ?? 0;
      const newStreak = prevPct >= 50 ? (r.streak || 0) + 1 : 1;
      const newHp = prevPct >= 80 ? Math.min(HP_MAX, (r.hp || HP_MAX) + 10) : (r.hp || HP_MAX);
      const hist = [...(r.history || [])];
      if (hist.length >= 7) hist.shift();
      hist.push({ date: TODAY, pct: 0, cats: { person: 0, people: 0, process: 0, product: 0 } });
      return {
        date: TODAY, completed: {}, counters: {}, notes: {}, timers: {},
        xp: 0, totalXp: r.totalXp || 0,
        streak: newStreak, bestStreak: Math.max(r.bestStreak || 0, newStreak),
        daysCompleted: (r.daysCompleted || 0) + (prevPct >= 50 ? 1 : 0),
        hp: newHp, redemptionMode: newHp <= 0,
        challengeCompleted: false, bossCompleted: false,
        customTasks: r.customTasks || null, history: hist,
      };
    }
  } catch (e) { console.warn("PPPP load error", e); }
  return {
    date: TODAY, completed: {}, counters: {}, notes: {}, timers: {},
    xp: 0, totalXp: 0, streak: 1, bestStreak: 1, daysCompleted: 0,
    hp: HP_MAX, redemptionMode: false,
    challengeCompleted: false, bossCompleted: false,
    customTasks: null,
    history: Array(7).fill(null).map((_,i) => {
      const d = new Date(); d.setDate(d.getDate() - (6 - i));
      return { date: d.toISOString().slice(0,10), pct: 0,
        cats: { person: 0, people: 0, process: 0, product: 0 }};
    })
  };
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
}

// ─── TIMER HOOK ───
function useTimer(taskId, state, setState) {
  const [running, setRunning] = useState(false);
  const [secs, setSecs] = useState(state.timers?.[taskId] || 0);
  const ref = useRef(null);
  useEffect(() => {
    if (running) { ref.current = setInterval(() => setSecs(s => s + 1), 1000); }
    else { clearInterval(ref.current); }
    return () => clearInterval(ref.current);
  }, [running]);
  useEffect(() => {
    setState(p => ({ ...p, timers: { ...p.timers, [taskId]: secs } }));
  }, [secs]);
  const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  return { secs, running, toggle: () => setRunning(r => !r), reset: () => { setSecs(0); setRunning(false); }, fmt: fmt(secs) };
}

              <line key={y} x1="92" y1={y} x2="208" y2={y} stroke={stoneLight} strokeWidth="0.5" opacity="0.3" />

            {/* Door opening */}
            <rect x="135" y="120" width="30" height="35" fill={isDark ? "#111827" : "#F3F4F6"} rx="2" />
            <path d="M135 120 Q150 108 165 120" fill={isDark ? "#374151" : "#D1D5DB"} />
          </g>
        )}

        {/* Stage 4: Pillars added */}
        {stage >= 4 && (
          <g>
            {/* Left pillar pair */}
            <rect x="82" y="100" width="8" height="55" fill={pillarColor} rx="2" />
            <rect x="82" y="97" width="8" height="5" fill={pillarColor} rx="1" />
            <rect x="100" y="100" width="8" height="55" fill={pillarColor} rx="2" />
            <rect x="100" y="97" width="8" height="5" fill={pillarColor} rx="1" />
            {/* Right pillar pair */}
            <rect x="192" y="100" width="8" height="55" fill={pillarColor} rx="2" />
            <rect x="192" y="97" width="8" height="5" fill={pillarColor} rx="1" />
            <rect x="210" y="100" width="8" height="55" fill={pillarColor} rx="2" />
            <rect x="210" y="97" width="8" height="5" fill={pillarColor} rx="1" />
            {/* Pillar bases */}
            <rect x="80" y="153" width="12" height="4" fill={pillarColor} rx="1" />
            <rect x="98" y="153" width="12" height="4" fill={pillarColor} rx="1" />
            <rect x="190" y="153" width="12" height="4" fill={pillarColor} rx="1" />
            <rect x="208" y="153" width="12" height="4" fill={pillarColor} rx="1" />
          </g>
        )}

        {/* Stage 5: Roof structure (frame) */}
        {stage >= 5 && (
          <g>
            {/* Horizontal beam */}
            <rect x="70" y="90" width="160" height="8" fill={stone} rx="2" stroke={stoneLight} strokeWidth="0.5" />
            {/* Triangular roof frame */}
            <line x1="70" y1="90" x2="150" y2="55" stroke={roofColor} strokeWidth="3" opacity="0.7" />
            <line x1="230" y1="90" x2="150" y2="55" stroke={roofColor} strokeWidth="3" opacity="0.7" />
            <line x1="70" y1="90" x2="230" y2="90" stroke={roofColor} strokeWidth="2" opacity="0.5" />
          </g>
        )}

        {/* Stage 6: Roof complete */}
        {stage >= 6 && (
          <g>
            <polygon points="65,92 150,50 235,92" fill={roofColor} opacity="0.85" />
            <polygon points="65,92 150,50 235,92" fill="none" stroke={isDark ? "#60A5FA" : "#1D4ED8"} strokeWidth="1" />
            {/* Roof texture */}
            <line x1="85" y1="85" x2="150" y2="56" stroke={isDark ? "#60A5FA" : "#1D4ED8"} strokeWidth="0.5" opacity="0.3" />
            <line x1="215" y1="85" x2="150" y2="56" stroke={isDark ? "#60A5FA" : "#1D4ED8"} strokeWidth="0.5" opacity="0.3" />
          </g>
        )}

        {/* Stage 7: Golden dome */}
        {stage >= 7 && (
          <g filter="url(#glow)">
            <ellipse cx="150" cy="52" rx="18" ry="14" fill="url(#domeGold)" />
            <ellipse cx="150" cy="52" rx="18" ry="14" fill="none" stroke="#FCD34D" strokeWidth="1" />
            {/* Cross on top */}
            <line x1="150" y1="32" x2="150" y2="42" stroke={goldColor} strokeWidth="2.5" strokeLinecap="round" />
            <line x1="145" y1="36" x2="155" y2="36" stroke={goldColor} strokeWidth="2.5" strokeLinecap="round" />
          </g>
        )}

        {/* Stage 8: Radiant light */}
        {stage >= 8 && (
          <g>
            <circle cx="150" cy="50" r="60" fill="url(#radiance)" opacity="0.7">
              <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite" />
              <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite" />
            </circle>
            {/* Light rays */}
            {[0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330].map(angle => {
              const rad = (angle * Math.PI) / 180;
              const x1 = 150 + Math.cos(rad) * 30;
              const y1 = 50 + Math.sin(rad) * 25;
              const x2 = 150 + Math.cos(rad) * 70;
              const y2 = 50 + Math.sin(rad) * 55;
              return (
                <line key={angle} x1={x1} y1={y1} x2={x2} y2={y2}
                  stroke={goldColor} strokeWidth="1" opacity="0.25" strokeLinecap="round">
                  <animate attributeName="opacity" values="0.15;0.35;0.15" dur={`${2 + (angle % 3)}s`} repeatCount="indefinite" />
                </line>
              );
            })}
            {/* Sparkle dots */}
            {[{x:120,y:35},{x:180,y:40},{x:130,y:70},{x:170,y:65},{x:100,y:55},{x:200,y:50}].map((p,i) => (
              <circle key={i} cx={p.x} cy={p.y} r="1.5" fill="#FCD34D" opacity="0.6">
                <animate attributeName="opacity" values="0.2;0.8;0.2" dur={`${1.5 + i * 0.3}s`} repeatCount="indefinite" />
              </circle>
            ))}
          </g>
        )}
      </svg>
      <div style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.15em", marginTop: 4 }}>
        {stageName.toUpperCase()} TEMPLE
      </div>
    </div>
  );
}

// ─── REDEMPTION MODE OVERLAY ───
function RedemptionMode({ state, setState, th }) {
  const spiritTasks = [
    { id: "redeem_bible", label: "Read a Bible Chapter", hp: 25 },
    { id: "redeem_prayer", label: "15 Minutes of Prayer", hp: 25 },
    { id: "redeem_worship", label: "10 Minutes of Worship", hp: 25 },
    { id: "redeem_psalm", label: "Read a Psalm Aloud", hp: 25 },
  ];

  const completed = state.redemptionCompleted || {};
  const totalRecovered = Object.values(completed).filter(Boolean).length * 25;

  const toggleRedeem = (id, hpVal) => {
    setState(p => {
      const was = p.redemptionCompleted?.[id];
      const newCompleted = { ...p.redemptionCompleted, [id]: !was };
      const newHp = Math.min(HP_MAX, p.hp + (was ? -hpVal : hpVal));
      const allDone = Object.values(newCompleted).filter(Boolean).length >= 4;
      if (!was) playTick();
      return {
        ...p,
        hp: newHp,
        redemptionCompleted: newCompleted,
        redemptionMode: allDone ? false : true,
      };
    });
  };

  return (
    <div style={{
      position: "fixed", top: 0, left: 0, right: 0, bottom: 0, zIndex: 1000,
      background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center",
      backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)",
    }}>
      <div style={{
        maxWidth: 400, width: "90%", padding: "32px 28px", borderRadius: 20,
        background: th === dark ? "#111827" : "#FFFFFF",
        border: `1px solid ${th.red}40`, boxShadow: `0 0 60px ${th.red}20`,
      }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>{"\u271E"}</div>
          <h2 style={{ fontSize: 18, fontWeight: 800, color: th.red, margin: "0 0 8px", letterSpacing: "-0.02em", fontFamily: FONT }}>
            REDEMPTION MODE
          </h2>
          <p style={{ fontSize: 12, color: th.mid, margin: 0, fontFamily: FONT, lineHeight: 1.5 }}>
            Your HP has fallen to 0. Complete these spirit tasks to restore your strength and return to battle.
          </p>
        </div>

        <div style={{ marginBottom: 20 }}>
          <HealthBar hp={state.hp} th={th} />
        </div>

        {spiritTasks.map(t => {
          const done = completed[t.id];
          return (
            <div key={t.id} onClick={() => toggleRedeem(t.id, t.hp)} style={{
              display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "14px 16px", borderRadius: 12, marginBottom: 8, cursor: "pointer",
              background: done ? `${th.blue}10` : th.glass,
              border: `1px solid ${done ? th.blue + "30" : th.glassBorder}`,
              transition: "all 0.25s ease",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{
                  width: 22, height: 22, borderRadius: 6, flexShrink: 0,
                  border: `1.5px solid ${done ? th.blue : th.dim}`,
                  background: done ? th.blue : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  {done && <span style={{ color: th.check, fontSize: 12, fontWeight: 800 }}>{"\u2713"}</span>}
                </div>
                <span style={{ fontSize: 13, fontWeight: 500, color: done ? th.dim : th.text, fontFamily: FONT,
                  textDecoration: done ? "line-through" : "none" }}>{t.label}</span>
              </div>
              <span style={{ fontSize: 11, fontWeight: 700, color: done ? "#22C55E" : th.ghost, fontFamily: FONT }}>+{t.hp} HP</span>
            </div>
          );
        })}

        <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: th.dim, fontFamily: FONT }}>
          {totalRecovered >= 100 ? "HP fully restored! Returning to battle..." : `${totalRecovered}/100 HP recovered`}
        </div>
      </div>
    </div>
  );
}

// ─── EDITABLE TASK ───
function Task({ task, done, counter, note, onToggle, onCount, onNote, onEdit, onDelete, mult, accent, th, state, setState }) {
  const xp = Math.round(task.xp * mult);
  const isDone = task.type === "check" ? done : (counter || 0) >= (task.target || 1);
  const [showNotes, setShowNotes] = useState(false);
  const [editing, setEditing] = useState(false);
  const [editLabel, setEditLabel] = useState(task.label);
  const [showMenu, setShowMenu] = useState(false);

  const saveEdit = () => {
    if (editLabel.trim() && editLabel !== task.label) {
      onEdit(task.id, editLabel.trim());
    }
    setEditing(false);
  };

  return (
    <div style={{ marginBottom: 6 }}>
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "12px 14px", borderRadius: 12, cursor: "pointer",
        background: isDone ? `${accent}08` : "transparent",
        border: `1px solid ${isDone ? `${accent}20` : th.ghost}`,
        transition: "all 0.25s ease",
      }}>
        <div onClick={() => { if (task.type === "check" && !editing) { onToggle(task.id); playTick(); }}}
          style={{ display: "flex", alignItems: "center", gap: 12, flex: 1, minWidth: 0 }}>
          <div style={{
            width: 20, height: 20, borderRadius: 6, flexShrink: 0,
            border: `1.5px solid ${isDone ? accent : th.dim}`,
            background: isDone ? accent : "transparent",
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all 0.25s ease", boxShadow: isDone ? `0 0 12px ${accent}30` : "none",
          }}>
            {isDone && <span style={{ color: th.check, fontSize: 11, fontWeight: 800 }}>{"\u2713"}</span>}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            {editing ? (
              <input value={editLabel} onChange={e => setEditLabel(e.target.value)}
                onBlur={saveEdit} onKeyDown={e => { if(e.key === "Enter") saveEdit(); if(e.key === "Escape") setEditing(false); }}
                autoFocus onClick={e => e.stopPropagation()}
                style={{
                  width: "100%", fontSize: 13, fontWeight: 500, color: th.text, fontFamily: FONT,
                  background: "transparent", border: `1px solid ${th.blue}40`, borderRadius: 6,
                  padding: "4px 8px", outline: "none",
                }} />
            ) : (
              <div style={{ fontSize: 13, fontWeight: 500, color: isDone ? th.dim : th.mid,
                textDecoration: isDone ? "line-through" : "none", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
              }}>{task.label}</div>
            )}
            {task.type === "counter" && !editing && (
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
                <button onClick={e => { e.stopPropagation(); onCount(task.id, -10); }} style={{
                  width: 26, height: 26, borderRadius: 6, border: `1px solid ${th.glassBorder}`,
                  background: th.glass, color: th.mid, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
                }}>{"\u2212"}</button>
                <span style={{ fontSize: 12, fontWeight: 600, color: th.mid }}>{counter||0}<span style={{ color: th.dim }}>/{task.target}</span></span>
                <button onClick={e => { e.stopPropagation(); onCount(task.id, 10); }} style={{
                  width: 26, height: 26, borderRadius: 6, border: `1px solid ${accent}30`,
                  background: `${accent}10`, color: accent, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
                }}>+</button>
              </div>
            )}
            {!editing && <TimerButton taskId={task.id} state={state} setState={setState} th={th} />}

function Category({ catKey, cat, state, setState, mult, expanded, onExpand, th, colors, onEditTask, onDeleteTask, onAddTask }) {
  const c = colors[catKey];
  const all = cat.sections.flatMap(s => s.tasks);
  const doneN = all.filter(t => t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1)).length;
  const pct = all.length > 0 ? Math.round((doneN / all.length) * 100) : 0;

  const onToggle = useCallback(id => {
    setState(p => {
      const t = all.find(x => x.id === id); const was = p.completed[id];
      const dx = t ? Math.round(t.xp * mult) : 0;
      const newCompleted = { ...p.completed, [id]: !was };
      const secDone = cat.sections.some(sec => sec.tasks.every(tk =>
        tk.type === "check" ? newCompleted[tk.id] : (p.counters[tk.id]||0) >= (tk.target||1)
      ) && sec.tasks.some(tk => tk.id === id));
      if (secDone && !was) setTimeout(playCelebrate, 100);
      return { ...p, completed: newCompleted, xp: p.xp + (was ? -dx : dx), totalXp: p.totalXp + (was ? -dx : dx) };
    });
  }, [mult, cat, all]);

  const onCount = useCallback((id, delta) => {
    setState(p => {
      const t = all.find(x => x.id === id); const old = p.counters[id]||0;
      const nv = Math.max(0, Math.min(old + delta, t?.target||100));
      const wasDone = old >= (t?.target||1), isDone = nv >= (t?.target||1);
      const dx = t ? Math.round(t.xp * mult) : 0;
      let xd = 0; if (!wasDone && isDone) { xd = dx; playTick(); } if (wasDone && !isDone) xd = -dx;
      return { ...p, counters: { ...p.counters, [id]: nv }, xp: p.xp + xd, totalXp: p.totalXp + xd };
    });
  }, [mult, all]);

  const onNote = useCallback((id, val) => {
    setState(p => ({ ...p, notes: { ...p.notes, [id]: val } }));
  }, []);

  return (
    <div style={{
      borderRadius: 16, overflow: "hidden", marginBottom: 10,
      background: expanded ? `${c.accent}06` : th.glass,
      border: `1px solid ${expanded ? c.border : th.glassBorder}`,
      backdropFilter: "blur(24px)", WebkitBackdropFilter: "blur(24px)",
      transition: "all 0.4s cubic-bezier(0.16,1,0.3,1)",
      boxShadow: expanded ? `0 0 40px ${c.accent}10` : "none",
    }}>
      <div onClick={() => onExpand(catKey)} style={{
        padding: "18px 20px", cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{
            width: 36, height: 36, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center",
            background: c.dim, border: `1px solid ${c.border}`,
            fontSize: 11, fontWeight: 700, color: c.accent, letterSpacing: "0.04em",
          }}>{"P" + (Object.keys(colors).indexOf(catKey) + 1)}</div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, color: th.text, letterSpacing: "-0.02em" }}>{cat.label}</div>
            <div style={{ fontSize: 11, color: th.dim, letterSpacing: "0.03em", marginTop: 2 }}>{cat.subtitle}</div>
          </div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: pct === 100 ? c.accent : th.mid, letterSpacing: "-0.04em" }}>{pct}%</div>
          <div style={{ fontSize: 10, color: th.dim }}>{doneN}/{all.length}</div>
        </div>
      </div>
      {expanded && (
        <div style={{ padding: "0 20px 18px" }}>
          <Bar value={doneN} max={all.length} color={c.accent} h={3} th={th} />
          {cat.sections.map((sec, secIdx) => (
            <div key={sec.name} style={{ marginTop: 18 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, padding: "0 4px" }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.12em" }}>{sec.name}</span>
                <span style={{ fontSize: 10, color: th.ghost }}>{sec.time}</span>
              </div>
              {sec.tasks.map(task => (
                <Task key={task.id} task={task} done={state.completed[task.id]} counter={state.counters[task.id]}
                  note={state.notes?.[task.id]} onToggle={onToggle} onCount={onCount} onNote={onNote}
                  onEdit={(id, newLabel) => onEditTask(catKey, secIdx, id, newLabel)}
                  onDelete={(id) => onDeleteTask(catKey, secIdx, id)}
                  mult={mult} accent={c.accent} th={th} state={state} setState={setState} />
              ))}
              <AddTaskButton onAdd={(label) => onAddTask(catKey, secIdx, label)} th={th} />
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── HUMAN AVATAR ───
function HumanAvatar({ pct, th }) {
  // pct = daily completion 0-100, controls glow intensity
  const isDark = th === dark;
  const glowStrength = Math.max(0.05, pct / 100);
  const baseColor = isDark ? "#E5E7EB" : "#374151";
  const glowColor = pct >= 80 ? "#3B82F6" : pct >= 50 ? "#60A5FA" : isDark ? "#6B7280" : "#9CA3AF";
  const auraColor = pct >= 90 ? "#F59E0B" : pct >= 60 ? "#3B82F6" : "transparent";
  const auraOpacity = pct >= 60 ? glowStrength * 0.5 : 0;

  return (
    <svg viewBox="0 0 60 80" width="52" height="70">
      <defs>
        <radialGradient id="avatarGlow" cx="50%" cy="40%" r="50%">
          <stop offset="0%" stopColor={glowColor} stopOpacity={glowStrength * 0.7} />
          <stop offset="70%" stopColor={glowColor} stopOpacity={glowStrength * 0.2} />
          <stop offset="100%" stopColor={glowColor} stopOpacity="0" />
        </radialGradient>
        <filter id="avatarBlur">
          <feGaussianBlur stdDeviation={2 + glowStrength * 4} result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>
      {/* Aura / outer glow — appears at 60%+ */}
      {pct >= 60 && (
        <ellipse cx="30" cy="40" rx={24 + glowStrength * 6} ry={34 + glowStrength * 6}
          fill="none" stroke={auraColor} strokeWidth="1.5" opacity={auraOpacity}>
          <animate attributeName="rx" values={`${24 + glowStrength*4};${28 + glowStrength*6};${24 + glowStrength*4}`}
            dur="3s" repeatCount="indefinite" />
          <animate attributeName="opacity" values={`${auraOpacity*0.6};${auraOpacity};${auraOpacity*0.6}`}
            dur="3s" repeatCount="indefinite" />
        </ellipse>
      )}
      {/* Inner glow field */}
      <ellipse cx="30" cy="40" rx="20" ry="30" fill="url(#avatarGlow)">
        {pct >= 40 && (
          <animate attributeName="rx" values="18;22;18" dur="4s" repeatCount="indefinite" />
        )}
      </ellipse>
      {/* Head */}
      <circle cx="30" cy="20" r="8" fill={baseColor} opacity={0.6 + glowStrength * 0.4}
        filter={pct >= 50 ? "url(#avatarBlur)" : undefined} />
      {/* Body */}
      <line x1="30" y1="28" x2="30" y2="50" stroke={baseColor} strokeWidth="2.5"
        strokeLinecap="round" opacity={0.6 + glowStrength * 0.4} />
      {/* Arms */}
      <line x1="30" y1="34" x2="18" y2="44" stroke={baseColor} strokeWidth="2"
        strokeLinecap="round" opacity={0.5 + glowStrength * 0.4} />
      <line x1="30" y1="34" x2="42" y2="44" stroke={baseColor} strokeWidth="2"
        strokeLinecap="round" opacity={0.5 + glowStrength * 0.4} />
      {/* Legs */}
      <line x1="30" y1="50" x2="20" y2="66" stroke={baseColor} strokeWidth="2"
        strokeLinecap="round" opacity={0.5 + glowStrength * 0.4} />
      <line x1="30" y1="50" x2="40" y2="66" stroke={baseColor} strokeWidth="2"
        strokeLinecap="round" opacity={0.5 + glowStrength * 0.4} />
      {/* Completion sparkles at 80%+ */}
      {pct >= 80 && (
        <g>
          {[{x:14,y:16},{x:46,y:18},{x:12,y:50},{x:48,y:48},{x:20,y:68},{x:40,y:70}].map((p,i) => (
            <circle key={i} cx={p.x} cy={p.y} r="1.2" fill={pct >= 90 ? "#FCD34D" : "#60A5FA"} opacity="0.5">
              <animate attributeName="opacity" values="0.2;0.7;0.2" dur={`${1.5 + i * 0.3}s`} repeatCount="indefinite" />
            </circle>
          ))}
        </g>
      )}
    </svg>
  );
}

        tk.type === "check" ? newCompleted[tk.id] : (p.counters[tk.id]||0) >= (tk.target||1)
      ) && sec.tasks.some(tk => tk.id === id));
      if (secDone && !was) setTimeout(playCelebrate, 100);
      return { ...p, completed: newCompleted, xp: p.xp + (was ? -dx : dx), totalXp: p.totalXp + (was ? -dx : dx) };
    });
  }, [mult, cat, all]);

  const onCount = useCallback((id, delta) => {
    setState(p => {
      const t = all.find(x => x.id === id); const old = p.counters[id]||0;
      const nv = Math.max(0, Math.min(old + delta, t?.target||100));
      const wasDone = old >= (t?.target||1), isDone = nv >= (t?.target||1);
      const dx = t ? Math.round(t.xp * mult) : 0;
      let xd = 0; if (!wasDone && isDone) { xd = dx; playTick(); } if (wasDone && !isDone) xd = -dx;
      return { ...p, counters: { ...p.counters, [id]: nv }, xp: p.xp + xd, totalXp: p.totalXp + xd };
    });
  }, [mult, all]);

  const onNote = useCallback((id, val) => {
    setState(p => ({ ...p, notes: { ...p.notes, [id]: val } }));
  }, []);

  return (
    <div style={{ padding: "0 20px 40px" }}>
      {/* Back button + header */}
      <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "24px 0 16px" }}>
        <button onClick={onBack} style={{
          width: 40, height: 40, borderRadius: 12, cursor: "pointer",
          border: `1px solid ${th.glassBorder}`, background: th.glass,
          backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
          color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: FONT,
        }}>{"\u2190"}</button>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: c.accent, letterSpacing: "0.1em",
              padding: "3px 10px", borderRadius: 12, background: `${c.accent}15`,
            }}>P{catIndex + 1}</span>
            <span style={{ fontSize: 20, fontWeight: 800, color: th.text, letterSpacing: "-0.03em" }}>{cat.label}</span>
          </div>
          <div style={{ fontSize: 11, color: th.dim, marginTop: 2 }}>{cat.subtitle}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 26, fontWeight: 800, color: pct === 100 ? c.accent : th.mid }}>{pct}%</div>
          <div style={{ fontSize: 10, color: th.dim }}>{doneN}/{all.length}</div>
        </div>
      </div>

      {/* Health bar */}
      <div style={{ ...glassStyle(th), padding: "12px 18px", marginBottom: 12 }}>
        <HealthBar hp={state.hp} th={th} />
      </div>

      {/* Daily challenge */}
      <DailyChallengeCard challenge={dailyChallenge} completed={challengeCompleted} onToggle={toggleChallenge} th={th} />

      {/* Progress bar */}
      <div style={{ ...glassStyle(th), padding: "14px 18px", marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
          <span style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.08em" }}>PROGRESS</span>
          <span style={{ fontSize: 10, color: th.dim }}>{doneN}/{all.length}</span>
        </div>
        <Bar value={doneN} max={all.length} color={pct === 100 ? th.red : c.accent} h={5} th={th} />
        {pct === 100 && (
          <div style={{ marginTop: 10, padding: "8px 0", borderRadius: 8, textAlign: "center",
            background: th.redDim, border: `1px solid ${th.red}20` }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: th.red, letterSpacing: "0.06em" }}>
              {"\u2726"} SECTION COMPLETE {"\u2726"}
            </span>
          </div>
        )}
      </div>

      {/* Sections and tasks */}
      {cat.sections.map((sec, secIdx) => (
        <div key={sec.name} style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, padding: "0 4px" }}>
            <span style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.12em" }}>{sec.name}</span>
            <span style={{ fontSize: 10, color: th.ghost }}>{sec.time}</span>
          </div>
          {sec.tasks.map(task => (
            <Task key={task.id} task={task} done={state.completed[task.id]} counter={state.counters[task.id]}
              note={state.notes?.[task.id]} onToggle={onToggle} onCount={onCount} onNote={onNote}
              onEdit={(id, newLabel) => onEditTask(catKey, secIdx, id, newLabel)}
              onDelete={(id) => onDeleteTask(catKey, secIdx, id)}
              mult={mult} accent={c.accent} th={th} state={state} setState={setState} />
          ))}
          <AddTaskButton onAdd={(label) => onAddTask(catKey, secIdx, label)} th={th} />
        </div>
      ))}
    </div>
  );
}

// ─── NETWORK OF INTERCESSION ───
const DEFAULT_PRAYER_PEOPLE = [
  { id: "p1", name: "Family", prayed: false },
  { id: "p2", name: "Church leaders", prayed: false },
  { id: "p3", name: "Friends", prayed: false },
  { id: "p4", name: "Colleagues", prayed: false },
  { id: "p5", name: "Nations", prayed: false },
];

function IntercessionView({ state, setState, th, onBack }) {
  const isDark = th === dark;
  const people = state.prayerPeople || DEFAULT_PRAYER_PEOPLE;
  const prayedCount = people.filter(p => p.prayed).length;

  const togglePrayed = (id) => {
    setState(p => {
      const pp = (p.prayerPeople || DEFAULT_PRAYER_PEOPLE).map(person =>
        person.id === id ? { ...person, prayed: !person.prayed } : person
      );
      return { ...p, prayerPeople: pp };
    });
  };

  const addPerson = (name) => {
    setState(p => {
      const pp = [...(p.prayerPeople || DEFAULT_PRAYER_PEOPLE)];
      pp.push({ id: `pray_${Date.now()}`, name, prayed: false });
      return { ...p, prayerPeople: pp };
    });
  };

  const removePerson = (id) => {
    setState(p => {
      const pp = (p.prayerPeople || DEFAULT_PRAYER_PEOPLE).filter(person => person.id !== id);
      return { ...p, prayerPeople: pp };
    });
  };

  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState("");

  // Network visualization: place people in a circle
  const centerX = 150, centerY = 120, radius = 80;

  return (
    <div style={{ padding: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 24 }}>
        <button onClick={onBack} style={{
          width: 40, height: 40, borderRadius: 12, cursor: "pointer",
          border: `1px solid ${th.glassBorder}`, background: th.glass,
          color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: FONT, backdropFilter: "blur(20px)",
        }}>{"\u2190"}</button>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: th.text, letterSpacing: "-0.03em" }}>Network of Intercession</div>
          <div style={{ fontSize: 10, color: th.dim }}>{prayedCount}/{people.length} prayed for today</div>
        </div>
      </div>

      {/* Network visualization */}
      <div style={{ ...glassStyle(th), padding: "20px 16px", marginBottom: 16 }}>
        <svg viewBox="0 0 300 240" width="100%" style={{ display: "block", margin: "0 auto", maxWidth: 400 }}>
          <defs>
            <radialGradient id="prayerGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor={th.gold} stopOpacity="0.4" />
              <stop offset="100%" stopColor={th.gold} stopOpacity="0" />
            </radialGradient>
          </defs>
          {/* Center cross */}
          <line x1={centerX} y1={centerY - 16} x2={centerX} y2={centerY + 16} stroke={th.gold} strokeWidth="2.5" strokeLinecap="round" opacity="0.6" />
          <line x1={centerX - 10} y1={centerY - 6} x2={centerX + 10} y2={centerY - 6} stroke={th.gold} strokeWidth="2.5" strokeLinecap="round" opacity="0.6" />
          {/* Connection lines to each person */}
          {people.map((p, i) => {
            const angle = (i / people.length) * Math.PI * 2 - Math.PI / 2;
            const px = centerX + Math.cos(angle) * radius;
            const py = centerY + Math.sin(angle) * radius;
            return (
              <line key={`line-${p.id}`} x1={centerX} y1={centerY} x2={px} y2={py}
                stroke={p.prayed ? th.gold : th.dim} strokeWidth={p.prayed ? 1.5 : 0.8}
                opacity={p.prayed ? 0.6 : 0.2} strokeDasharray={p.prayed ? "none" : "3,3"}>
                {p.prayed && <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite" />}
              </line>
            );
          })}
          {/* Person nodes */}
          {people.map((p, i) => {
            const angle = (i / people.length) * Math.PI * 2 - Math.PI / 2;
            const px = centerX + Math.cos(angle) * radius;
            const py = centerY + Math.sin(angle) * radius;
            return (
              <g key={p.id}>
                {p.prayed && (
                  <circle cx={px} cy={py} r="18" fill="url(#prayerGlow)">
                    <animate attributeName="r" values="15;20;15" dur="3s" repeatCount="indefinite" />
                  </circle>
                )}
                <circle cx={px} cy={py} r="10" fill={p.prayed ? th.gold : isDark ? "#374151" : "#D1D5DB"}
                  opacity={p.prayed ? 0.9 : 0.5} />
                {/* Simple human icon inside */}
                <circle cx={px} cy={py - 3} r="2.5" fill={p.prayed ? (isDark ? "#050508" : "#fff") : th.dim} />
                <line x1={px} y1={py} x2={px} y2={py + 4} stroke={p.prayed ? (isDark ? "#050508" : "#fff") : th.dim}
                  strokeWidth="1.5" strokeLinecap="round" />
                <text x={px} y={py + 24} textAnchor="middle" fill={p.prayed ? th.gold : th.dim}
                  fontSize="7" fontWeight="600" fontFamily="system-ui">{p.name}</text>
              </g>
            );
          })}
        </svg>
      </div>

      {/* Prayer list */}
      <div style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.12em", marginBottom: 10 }}>PRAYER LIST</div>
      {people.map(p => (
        <div key={p.id} style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "12px 14px", borderRadius: 12, marginBottom: 6,
          background: p.prayed ? `${th.gold}08` : th.glass,
          border: `1px solid ${p.prayed ? th.gold + "25" : th.glassBorder}`,
          cursor: "pointer", transition: "all 0.25s ease",
        }}>
          <div onClick={() => { togglePrayed(p.id); if (!p.prayed) playTick(); }}
            style={{ display: "flex", alignItems: "center", gap: 12, flex: 1 }}>
            <div style={{
              width: 22, height: 22, borderRadius: 7, flexShrink: 0,
              border: `1.5px solid ${p.prayed ? th.gold : th.dim}`,
              background: p.prayed ? th.gold : "transparent",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "all 0.25s ease", boxShadow: p.prayed ? `0 0 10px ${th.gold}30` : "none",
            }}>
              {p.prayed && <span style={{ color: th.check, fontSize: 12, fontWeight: 800 }}>{"\u2713"}</span>}
            </div>
            <span style={{ fontSize: 13, fontWeight: 500, color: p.prayed ? th.dim : th.text,
              textDecoration: p.prayed ? "line-through" : "none" }}>{p.name}</span>
          </div>
          <button onClick={() => { if (confirm(`Remove "${p.name}" from prayer list?`)) removePerson(p.id); }} style={{
            background: "none", border: "none", color: th.dim, cursor: "pointer",
            fontSize: 14, padding: "2px 6px", fontFamily: FONT,
          }}>{"\u00D7"}</button>
        </div>
      ))}

      {/* Add person */}
      {adding ? (
        <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
          <input value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && newName.trim()) { addPerson(newName.trim()); setNewName(""); setAdding(false); }
              if (e.key === "Escape") setAdding(false); }}
            autoFocus placeholder="Name or group..."
            style={{ flex: 1, padding: "8px 12px", borderRadius: 8, border: `1px solid ${th.gold}30`,
              background: th.glass, color: th.text, fontSize: 12, fontFamily: FONT, outline: "none" }} />
          <button onClick={() => { if (newName.trim()) { addPerson(newName.trim()); setNewName(""); setAdding(false); }}} style={{
            padding: "8px 14px", borderRadius: 8, border: `1px solid ${th.gold}40`,
            background: th.goldDim, color: th.gold, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
          }}>ADD</button>
        </div>
      ) : (
        <button onClick={() => setAdding(true)} style={{
          width: "100%", padding: "10px", borderRadius: 10, marginTop: 8,
          border: `1px dashed ${th.gold}30`, background: "transparent",
          color: th.gold, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: FONT,
        }}>+ ADD TO PRAYER LIST</button>
      )}
    </div>
  );
}

// ─── USER PROFILE ───
const PROFILE_KEY = "pva_profile";
function loadProfile() {
  try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || "null"); } catch { return null; }
}
function saveProfile(p) {
  try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); } catch {}
}

              color: name.trim() ? th.blue : th.ghost,
              fontSize: 13, fontWeight: 700, cursor: name.trim() ? "pointer" : "default",
              fontFamily: FONT, letterSpacing: "0.04em",
              transition: "all 0.25s ease",
            }}>ENTER YOUR PVA MODEL</button>
          </>
        )}
      </div>
    </div>
  );
}

// ─── SETTINGS VIEW ───
function SettingsView({ profile, onSave, onBack, th }) {
  const [name, setName] = useState(profile.name);

  return (
    <div style={{ padding: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 24 }}>
        <button onClick={onBack} style={{
          width: 40, height: 40, borderRadius: 12, cursor: "pointer",
          border: `1px solid ${th.glassBorder}`, background: th.glass,
          color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: FONT, backdropFilter: "blur(20px)",
        }}>{"\u2190"}</button>
        <div style={{ fontSize: 18, fontWeight: 800, color: th.text }}>Settings</div>
      </div>

      <div style={{ ...glassStyle(th), padding: "20px", marginBottom: 16 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.1em", marginBottom: 10 }}>YOUR NAME</div>
        <input value={name} onChange={e => setName(e.target.value)}
          style={{
            width: "100%", padding: "12px 14px", borderRadius: 10,
            border: `1px solid ${th.blue}30`, background: th.glass,
            color: th.text, fontSize: 14, fontWeight: 600, fontFamily: FONT, outline: "none",
          }} />
        <button onClick={() => { if (name.trim()) { onSave({ ...profile, name: name.trim() }); onBack(); }}} style={{
          width: "100%", padding: "12px", borderRadius: 10, marginTop: 12,
          border: `1px solid ${th.blue}40`, background: th.blueDim,
          color: th.blue, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
        }}>SAVE</button>
      </div>

      <div style={{ ...glassStyle(th), padding: "20px" }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.1em", marginBottom: 10 }}>ABOUT</div>
        <div style={{ fontSize: 12, color: th.mid, lineHeight: 1.6 }}>
          PVA {"\u2014"} Person, Vehicle, Assignment
        </div>
        <div style={{ fontSize: 11, color: th.dim, marginTop: 6 }}>
          A gamified daily discipline tracker.
        </div>
        <div style={{ fontSize: 10, color: th.ghost, marginTop: 10 }}>
          Member since {profile.createdAt || "today"}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ───
export default function PPPPApp() {
  const [profile, setProfile] = useState(loadProfile);
  const [themeMode, setThemeMode] = useState(getAutoTheme);
  const [autoTheme, setAutoTheme] = useState(true);
  const [state, setState] = useState(loadState);
  const [view, setView] = useState("home"); // "home" | "category" | "weekly" | "pva_glance" | "intercession" | "settings"
  const [activeCat, setActiveCat] = useState(null);
  const [celebrate, setCelebrate] = useState(false);
  const [showSummary, setShowSummary] = useState(false);

  // If no profile, show onboarding
  if (!profile) {
    return <OnboardingScreen onComplete={(p) => setProfile(p)} />;
  }

  const userName = profile.name;
  const scrollRef = useRef(null);

  const th = themeMode === "dark" ? dark : light;
  const isDark = themeMode === "dark";
  const colors = catColors(th);

  // Task management
  const tasks = useMemo(() => {
    return state.customTasks || DEFAULT_TASKS;
  }, [state.customTasks]);

  const getEditableTasks = () => {
    return state.customTasks ? JSON.parse(JSON.stringify(state.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
  };

  const onEditTask = useCallback((catKey, secIdx, taskId, newLabel) => {
    setState(p => {
      const t = p.customTasks ? JSON.parse(JSON.stringify(p.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
      const sec = t[catKey]?.sections?.[secIdx];
      if (sec) { const task = sec.tasks.find(tk => tk.id === taskId); if (task) task.label = newLabel; }
      return { ...p, customTasks: t };
    });
  }, []);

  const onDeleteTask = useCallback((catKey, secIdx, taskId) => {
    setState(p => {
      const t = p.customTasks ? JSON.parse(JSON.stringify(p.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
      const sec = t[catKey]?.sections?.[secIdx];
      if (sec) sec.tasks = sec.tasks.filter(tk => tk.id !== taskId);
      const nc = { ...p.completed }; delete nc[taskId];
      return { ...p, customTasks: t, completed: nc };
    });
  }, []);

  const onAddTask = useCallback((catKey, secIdx, label) => {
    setState(p => {
      const t = p.customTasks ? JSON.parse(JSON.stringify(p.customTasks)) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
      const sec = t[catKey]?.sections?.[secIdx];
      if (sec) {
        const id = `custom_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
        sec.tasks.push({ id, label, xp: 15, type: "check", hasNotes: true, notesPlaceholder: "Notes..." });
      }
      return { ...p, customTasks: t };
    });
  }, []);

  useEffect(() => { saveState(state); }, [state]);
  useEffect(() => {
    if (autoTheme) {
      const id = setInterval(() => setThemeMode(getAutoTheme()), 60000);
      setThemeMode(getAutoTheme());
      return () => clearInterval(id);
    }
  }, [autoTheme]);

  const mult = getMult(state.streak);
  const { cur: level, nxt: nextLevel, idx: levelIdx } = getLevel(state.totalXp);

  const all = Object.values(tasks).flatMap(c => c.sections.flatMap(s => s.tasks));
  const doneN = all.filter(t => t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1)).length;
  const dayPct = all.length > 0 ? Math.round((doneN / all.length) * 100) : 0;
  const dayXp = all.reduce((s, t) => {
    const d = t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1);
    return s + (d ? Math.round(t.xp * mult) : 0);
  }, 0);

  // Per-category completion
  const getCatPct = (catKey) => {
    const a = tasks[catKey].sections.flatMap(s => s.tasks);
    const d = a.filter(t => t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1)).length;
    return a.length > 0 ? Math.round((d / a.length) * 100) : 0;
  };

  // Daily Challenge
  const dailyChallenge = getDailyChallenge(TODAY);
  const toggleChallenge = () => {
    setState(p => {
      const was = p.challengeCompleted; const dx = dailyChallenge.xp;
      if (!was) playTick();
      return { ...p, challengeCompleted: !was, xp: p.xp + (was ? -dx : dx), totalXp: p.totalXp + (was ? -dx : dx) };
    });
  };

  const toggleHomeTask = useCallback((id) => {
    const allT = Object.values(tasks).flatMap(c => c.sections.flatMap(s => s.tasks));
    setState(p => {
      const t = allT.find(x => x.id === id); const was = p.completed[id];
      const dx = t ? Math.round(t.xp * mult) : 0;
      if (!was) playTick();
      return { ...p, completed: { ...p.completed, [id]: !was }, xp: p.xp + (was ? -dx : dx), totalXp: p.totalXp + (was ? -dx : dx) };
    });
  }, [tasks, mult]);

  // Weekly Boss
  const boss = getWeeklyBoss(TODAY);

  // HP system
  useEffect(() => {
    const hour = new Date().getHours();
    if (hour >= 23 && dayPct < 100 && !state._hpDrained) {
      const missedXp = all.reduce((s, t) => {
        const d = t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1);
        return s + (d ? 0 : t.xp);
      }, 0);
      const totalXpPool = all.reduce((s,t) => s + t.xp, 0);
      const hpLoss = totalXpPool > 0 ? Math.round((missedXp / totalXpPool) * 30) : 0;
      if (hpLoss > 0) {
        playDamage();
        setState(p => {
          const newHp = Math.max(0, p.hp - hpLoss);
          return { ...p, hp: newHp, _hpDrained: true, redemptionMode: newHp <= 0 };
        });
      }
    }
    if (dayPct >= 80 && !state._hpRegen) {
      setState(p => ({ ...p, hp: Math.min(HP_MAX, p.hp + 10), _hpRegen: true }));
    }
  }, [dayPct, state._hpDrained, state._hpRegen]);

  useEffect(() => {
    if (dayPct === 100 && !celebrate) { setCelebrate(true); playCelebrate(); }
  }, [dayPct]);

  const toggleTheme = () => { setAutoTheme(false); setThemeMode(m => m === "dark" ? "light" : "dark"); };

  const openCategory = (catKey) => { setActiveCat(catKey); setView("category"); };
  const goHome = () => { setView("home"); setActiveCat(null); };

  const catKeys = ["person", "people", "process", "product"];

  return (
    <div style={{ minHeight: "100vh", fontFamily: FONT, color: th.text, background: th.grad, transition: "background 0.5s ease" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap');
        .pppp-tiles::-webkit-scrollbar { display: none; }
        .pppp-tiles { -ms-overflow-style: none; scrollbar-width: none; }
      `}</style>

      {/* Redemption Mode Overlay */}
      {state.redemptionMode && <RedemptionMode state={state} setState={setState} th={th} />}

      {/* Shareable Summary */}
      {showSummary && <ShareableSummary state={state} dayPct={dayPct} dayXp={dayXp} level={level}
        levelIdx={levelIdx} th={th} onClose={() => setShowSummary(false)} />}

      <div style={{ maxWidth: 640, margin: "0 auto" }}>

        {/* ─── TOP BAR ─── */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 20px 0" }}>
          <div style={{
            padding: "6px 16px", borderRadius: 20,
            background: th.glass, border: `1px solid ${th.glassBorder}`,
            backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
          }}>
            <span style={{ fontSize: 12, fontWeight: 800, color: th.text, letterSpacing: "-0.02em" }}>{userName}{"\u2019"}s PVA Model</span>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            {view !== "home" && (
              <button onClick={goHome} style={{
                padding: "6px 14px", borderRadius: 20, border: `1px solid ${th.glassBorder}`,
                background: th.glass, color: th.mid, fontSize: 11, fontWeight: 600,
                cursor: "pointer", fontFamily: FONT, backdropFilter: "blur(20px)",
              }}>HOME</button>
            )}
            <button onClick={() => setView(view === "weekly" ? "home" : "weekly")} style={{
              padding: "6px 14px", borderRadius: 20, border: `1px solid ${view === "weekly" ? th.blue + "40" : th.glassBorder}`,
              background: view === "weekly" ? th.blueDim : th.glass, color: view === "weekly" ? th.blue : th.mid,
              fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: FONT, backdropFilter: "blur(20px)",
            }}>WEEKLY</button>
            <button onClick={() => setShowSummary(true)} style={{
              padding: "6px 14px", borderRadius: 20, border: `1px solid ${th.glassBorder}`,
              background: th.glass, color: th.mid, fontSize: 11, fontWeight: 600,
              cursor: "pointer", fontFamily: FONT, backdropFilter: "blur(20px)",
            }}>SHARE</button>
            <button onClick={() => setView("settings")} style={{
              width: 36, height: 36, borderRadius: 18, border: `1px solid ${th.glassBorder}`,
              background: th.glass, color: th.mid, fontSize: 14, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
            }}>{"\u2699"}</button>
            <button onClick={toggleTheme} style={{
              width: 36, height: 36, borderRadius: 18, border: `1px solid ${th.glassBorder}`,
              background: th.glass, color: th.mid, fontSize: 14, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
            }}>{themeMode === "dark" ? "\u2600" : "\u263D"}</button>
          </div>
        </div>

        {/* ─── HOME VIEW ─── */}
        {view === "home" && (
          <>
            {/* Scripture + Avatar (right-aligned) */}
            <ScriptureHeader level={level} levelIdx={levelIdx} dayPct={dayPct} th={th} />

            {/* Stats bar */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, padding: "0 20px", marginBottom: 20 }}>
              {[
                { label: "TODAY", value: `${dayPct}%`, color: th.blue },
                { label: "STREAK", value: `${state.streak}`, color: th.red },
                { label: "HP", value: `${state.hp}`, color: state.hp > 60 ? "#22C55E" : state.hp > 30 ? th.gold : th.red },
                { label: "XP", value: `${dayXp}`, color: th.blue },
              ].map(x => (
                <div key={x.label} style={{ ...glassStyle(th), padding: "12px 0", textAlign: "center" }}>
                  <div style={{ fontSize: 18, fontWeight: 700, color: x.color, letterSpacing: "-0.04em" }}>{x.value}</div>
                  <div style={{ fontSize: 8, color: th.dim, letterSpacing: "0.14em", marginTop: 3 }}>{x.label}</div>
                </div>
              ))}
            </div>

            {/* ─── PVA + DECREES + INTERCESSION TILES ─── */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, padding: "0 20px", marginBottom: 20 }}>
              <div onClick={() => setView("pva_glance")} style={{
                ...glassStyle(th), padding: "20px 16px", cursor: "pointer",
                border: `1px solid ${th.blue}25`,
                background: `linear-gradient(135deg, ${th.blue}10 0%, transparent 100%)`,
                transition: "all 0.3s ease", textAlign: "center",
              }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: th.text, marginBottom: 4 }}>PVA AT A GLANCE</div>
                <div style={{ fontSize: 9, color: th.dim }}>Person {"\u00B7"} Vehicle {"\u00B7"} Assignment</div>
              </div>
              <div onClick={() => setView("decrees")} style={{
                ...glassStyle(th), padding: "20px 16px", cursor: "pointer",
                border: `1px solid ${th.red}25`,
                background: `linear-gradient(135deg, ${th.red}10 0%, transparent 100%)`,
                transition: "all 0.3s ease", textAlign: "center",
              }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: th.text, marginBottom: 4 }}>DECREES & DECLARATIONS</div>
                <div style={{ fontSize: 9, color: th.dim }}>Speak & Stand</div>
              </div>
              <div onClick={() => setView("intercession")} style={{
                ...glassStyle(th), padding: "20px 16px", cursor: "pointer",
                border: `1px solid ${th.gold}25`,
                background: `linear-gradient(135deg, ${th.gold}10 0%, transparent 100%)`,
                transition: "all 0.3s ease", textAlign: "center",
              }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: th.text, marginBottom: 4 }}>INTERCESSION</div>
                <div style={{ fontSize: 9, color: th.dim }}>Network of Prayer</div>
              </div>
            </div>

            {/* ─── HORIZONTAL P TILES (centre stage) ─── */}
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", marginBottom: 12, padding: "0 20px" }}>THE FOUR PILLARS</div>
              <div ref={scrollRef} className="pppp-tiles" style={{
                display: "flex", gap: 16, overflowX: "auto", overflowY: "hidden",
                scrollSnapType: "x mandatory", paddingBottom: 8,
                paddingLeft: 20, paddingRight: 20,
                WebkitOverflowScrolling: "touch",
                justifyContent: "center",
              }}>
                {catKeys.map((k, i) => (
                  <PTile key={k} catKey={k} cat={tasks[k]} index={i} pct={getCatPct(k)}
                    th={th} colors={colors} onClick={() => openCategory(k)} />
                ))}
              </div>

              {/* Daily Schedule — timings from all categories */}
              <div style={{ padding: "12px 20px 0" }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.14em", marginBottom: 10 }}>TODAY'S SCHEDULE</div>
                {(() => {
                  const allItems = [];
                  catKeys.forEach(k => {
                    const c = colors[k];
                    tasks[k].sections.forEach(s => {
                      s.tasks.forEach(t => {
                        allItems.push({ time: s.time, label: t.label, id: t.id, accent: c.accent, catKey: k });
                      });
                    });
                  });
                  /* Sort by time string (works for HH:MM format) */
                  allItems.sort((a, b) => {
                    const ta = (a.time || "99:99").replace(/\u2013/g, "-").split("-")[0].trim();
                    const tb = (b.time || "99:99").replace(/\u2013/g, "-").split("-")[0].trim();
                    return ta.localeCompare(tb);
                  });
                  return allItems.map((item) => {
                    const done = state.completed?.[item.id];
                    return (
                      <div key={item.id} onClick={() => toggleHomeTask(item.id)} style={{
                        display: "flex", alignItems: "center", gap: 12, padding: "9px 0",
                        borderBottom: `1px solid ${th.glassBorder || "rgba(255,255,255,0.06)"}`,
                        cursor: "pointer", transition: "all 0.2s ease",
                      }}>
                        <div style={{
                          fontSize: 10, fontWeight: 600, color: item.accent, minWidth: 80,
                          fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.04em",
                        }}>{item.time}</div>
                        <div style={{
                          fontSize: 12, fontWeight: 500, color: done ? th.dim : th.text,
                          textDecoration: done ? "line-through" : "none",
                          flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                        }}>{item.label}</div>
                        <div style={{
                          width: 20, height: 20, borderRadius: 6, flexShrink: 0,
                          border: `1.5px solid ${done ? item.accent : th.dim}`,
                          background: done ? item.accent : "transparent",
                          display: "flex", alignItems: "center", justifyContent: "center",
                          transition: "all 0.25s ease",
                          boxShadow: done ? `0 0 10px ${item.accent}30` : "none",
                        }}>
                          {done && <span style={{ color: th.check || "#fff", fontSize: 10, fontWeight: 800 }}>{"\u2713"}</span>}
                        </div>
                      </div>
                    );
                  });
                })()}
              </div>
            </div>

            {/* Daily Challenge (below tiles) */}
            <div style={{ padding: "0 20px", marginBottom: 20 }}>
              <DailyChallengeCard challenge={dailyChallenge} completed={state.challengeCompleted} onToggle={toggleChallenge} th={th} />
            </div>

            {/* XP Bar */}
            <div style={{ padding: "0 20px", marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                <span style={{ fontSize: 10, color: th.dim }}>{state.totalXp} XP</span>
                <span style={{ fontSize: 10, color: th.ghost }}>{nextLevel ? `${nextLevel.xp} \u2192 ${nextLevel.name}` : "MAX"}</span>
              </div>
              <Bar value={state.totalXp - level.xp} max={nextLevel ? nextLevel.xp - level.xp : 1} color={th.blue} h={3} th={th} />
            </div>

            {/* Temple */}
            <div style={{ ...glassStyle(th), padding: "16px 12px 8px", margin: "0 20px 20px" }}>
              <TempleVisual stage={levelIdx} th={th} />
            </div>

            {/* Footer */}
            <div style={{ textAlign: "center", padding: "20px 0 32px" }}>
              <div style={{ fontSize: 9, color: th.ghost, letterSpacing: "0.24em" }}>PVA {"\u00B7"} {TODAY}</div>
            </div>
          </>
        )}

        {/* ─── CATEGORY VIEW ─── */}
        {view === "category" && activeCat && tasks[activeCat] && (
          <TaskView catKey={activeCat} cat={tasks[activeCat]} state={state} setState={setState}
            mult={mult} th={th} colors={colors} onBack={goHome}
            onEditTask={onEditTask} onDeleteTask={onDeleteTask} onAddTask={onAddTask}
            dailyChallenge={dailyChallenge} challengeCompleted={state.challengeCompleted}
            toggleChallenge={toggleChallenge} />
        )}

        {/* ─── PVA GLANCE VIEW ─── */}
        {view === "pva_glance" && (
          <PVAGlanceView state={state} dayPct={dayPct} th={th} onBack={goHome} />
        )}

        {/* ─── INTERCESSION VIEW ─── */}
        {view === "intercession" && (
          <IntercessionView state={state} setState={setState} th={th} onBack={goHome} />
        )}

        {/* ─── SETTINGS VIEW ─── */}
        {view === "settings" && (
          <SettingsView profile={profile} onSave={(p) => { saveProfile(p); setProfile(p); }}
            onBack={goHome} th={th} />
        )}

        {/* ─── WEEKLY VIEW ─── */}
        {view === "weekly" && (
          <div style={{ padding: "20px" }}>
            <WeeklyView state={state} th={th} tasks={tasks} boss={boss} />
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PPPPApp />);

</script></body></html>
