const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
const getCtx = () => { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; };

function playTick() {
  try {
    const ctx = getCtx(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.05);
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.12);
  } catch {}
}
function playCelebrate() {
  try {
    const ctx = getCtx();
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.12);
      g.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
      o.start(ctx.currentTime + i * 0.12); o.stop(ctx.currentTime + i * 0.12 + 0.3);
    });
  } catch {}
}

}

// ─── STATE (localStorage-backed) ───
const STORAGE_KEY = "pppp_state";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const r = JSON.parse(raw || "null");
    if (r && r.date === TODAY) return r;
    if (r) {
      const prevPct = r.history?.[r.history.length - 1]?.pct ?? 0;
      const newStreak = prevPct >= 50 ? (r.streak || 0) + 1 : 1;
      const newHp = prevPct >= 80 ? Math.min(HP_MAX, (r.hp || HP_MAX) + 10) : (r.hp || HP_MAX);
      const hist = [...(r.history || [])];
      if (hist.length >= 30) hist.shift();
      hist.push({ date: TODAY, pct: 0, xp: 0, cats: { person: 0, people: 0, process: 0, product: 0 } });
      return {
        date: TODAY, completed: {}, counters: {}, notes: {}, timers: {},
        xp: 0, totalXp: r.totalXp || 0,
        streak: newStreak, bestStreak: Math.max(r.bestStreak || 0, newStreak),
        daysCompleted: (r.daysCompleted || 0) + (prevPct >= 50 ? 1 : 0),
        hp: newHp, redemptionMode: newHp <= 0,
        challengeCompleted: false, bossCompleted: false,
        customTasks: r.customTasks || null, history: hist,
      };
    }
  } catch (e) { console.warn("PPPP load error", e); }
  return {
    date: TODAY, completed: {}, counters: {}, notes: {}, timers: {},
    xp: 0, totalXp: 0, streak: 1, bestStreak: 1, daysCompleted: 0,
    hp: HP_MAX, redemptionMode: false,
    challengeCompleted: false, bossCompleted: false,
    customTasks: null,
    history: Array(7).fill(null).map((_,i) => {
      const d = new Date(); d.setDate(d.getDate() - (6 - i));
      return { date: d.toISOString().slice(0,10), pct: 0,
        cats: { person: 0, people: 0, process: 0, product: 0 }};
    })
  };
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
}

// ─── TIMER HOOK ───
function useTimer(taskId, state, setState) {
  const [running, setRunning] = useState(false);
  const [secs, setSecs] = useState(state.timers?.[taskId] || 0);
  const ref = useRef(null);
  useEffect(() => {
    if (running) { ref.current = setInterval(() => setSecs(s => s + 1), 1000); }
    else { clearInterval(ref.current); }
    return () => clearInterval(ref.current);
  }, [running]);
  useEffect(() => {
    setState(p => ({ ...p, timers: { ...p.timers, [taskId]: secs } }));
  }, [secs]);
  const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  return { secs, running, toggle: () => setRunning(r => !r), reset: () => { setSecs(0); setRunning(false); }, fmt: fmt(secs) };
}

            <rect x="192" y="100" width="8" height="55" fill={pillarColor} rx="2" />
            <rect x="192" y="97" width="8" height="5" fill={pillarColor} rx="1" />
            <rect x="210" y="100" width="8" height="55" fill={pillarColor} rx="2" />
            <rect x="210" y="97" width="8" height="5" fill={pillarColor} rx="1" />
            {/* Pillar bases */}
            <rect x="80" y="153" width="12" height="4" fill={pillarColor} rx="1" />
            <rect x="98" y="153" width="12" height="4" fill={pillarColor} rx="1" />
            <rect x="190" y="153" width="12" height="4" fill={pillarColor} rx="1" />
            <rect x="208" y="153" width="12" height="4" fill={pillarColor} rx="1" />
          </g>
        )}

        {/* Stage 5: Roof structure (frame) */}
        {stage >= 5 && (
          <g>
            {/* Horizontal beam */}
            <rect x="70" y="90" width="160" height="8" fill={stone} rx="2" stroke={stoneLight} strokeWidth="0.5" />
            {/* Triangular roof frame */}
            <line x1="70" y1="90" x2="150" y2="55" stroke={roofColor} strokeWidth="3" opacity="0.7" />
            <line x1="230" y1="90" x2="150" y2="55" stroke={roofColor} strokeWidth="3" opacity="0.7" />
            <line x1="70" y1="90" x2="230" y2="90" stroke={roofColor} strokeWidth="2" opacity="0.5" />
          </g>
        )}

        {/* Stage 6: Roof complete */}
        {stage >= 6 && (
          <g>
            <polygon points="65,92 150,50 235,92" fill={roofColor} opacity="0.85" />
            <polygon points="65,92 150,50 235,92" fill="none" stroke={isDark ? "#60A5FA" : "#1D4ED8"} strokeWidth="1" />
            {/* Roof texture */}
            <line x1="85" y1="85" x2="150" y2="56" stroke={isDark ? "#60A5FA" : "#1D4ED8"} strokeWidth="0.5" opacity="0.3" />
            <line x1="215" y1="85" x2="150" y2="56" stroke={isDark ? "#60A5FA" : "#1D4ED8"} strokeWidth="0.5" opacity="0.3" />
          </g>
        )}

        {/* Stage 7: Golden dome */}
        {stage >= 7 && (
          <g filter="url(#glow)">
            <ellipse cx="150" cy="52" rx="18" ry="14" fill="url(#domeGold)" />
            <ellipse cx="150" cy="52" rx="18" ry="14" fill="none" stroke="#FCD34D" strokeWidth="1" />
            {/* Cross on top */}
            <line x1="150" y1="32" x2="150" y2="42" stroke={goldColor} strokeWidth="2.5" strokeLinecap="round" />
            <line x1="145" y1="36" x2="155" y2="36" stroke={goldColor} strokeWidth="2.5" strokeLinecap="round" />
          </g>
        )}

        {/* Stage 8: Radiant light */}
        {stage >= 8 && (
          <g>
            <circle cx="150" cy="50" r="60" fill="url(#radiance)" opacity="0.7">
              <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite" />
              <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite" />
            </circle>
            {/* Light rays */}
            {[0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330].map(angle => {
              const rad = (angle * Math.PI) / 180;
              const x1 = 150 + Math.cos(rad) * 30;
              const y1 = 50 + Math.sin(rad) * 25;
              const x2 = 150 + Math.cos(rad) * 70;
              const y2 = 50 + Math.sin(rad) * 55;
              return (
                <line key={angle} x1={x1} y1={y1} x2={x2} y2={y2}
                  stroke={goldColor} strokeWidth="1" opacity="0.25" strokeLinecap="round">
                  <animate attributeName="opacity" values="0.15;0.35;0.15" dur={`${2 + (angle % 3)}s`} repeatCount="indefinite" />
                </line>
              );
            })}
            {/* Sparkle dots */}
            {[{x:120,y:35},{x:180,y:40},{x:130,y:70},{x:170,y:65},{x:100,y:55},{x:200,y:50}].map((p,i) => (
              <circle key={i} cx={p.x} cy={p.y} r="1.5" fill="#FCD34D" opacity="0.6">
                <animate attributeName="opacity" values="0.2;0.8;0.2" dur={`${1.5 + i * 0.3}s`} repeatCount="indefinite" />
              </circle>
            ))}
          </g>
        )}
      </svg>
      <div style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.15em", marginTop: 4 }}>
        {stageName.toUpperCase()} TEMPLE
      </div>
    </div>
  );
}

// ─── HEALTH BAR ───
function HealthBar({ hp, th }) {
  const pct = Math.max(0, Math.min(100, hp));
  const color = pct > 60 ? "#22C55E" : pct > 30 ? th.gold : th.red;
  const bgColor = pct > 60 ? "rgba(34,197,94,0.12)" : pct > 30 ? th.goldDim : th.redDim;

  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <span style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.1em" }}>HP</span>
        <span style={{ fontSize: 11, fontWeight: 700, color: color }}>{pct}/{HP_MAX}</span>
      </div>
      <div style={{
        width: "100%", height: 10, borderRadius: 5, background: th.ghost, overflow: "hidden",
        border: `1px solid ${pct <= 30 ? th.red + "40" : th.ghost}`,
      }}>
        <div style={{
          height: "100%", borderRadius: 5, width: `${pct}%`, background: color,
          boxShadow: `0 0 12px ${color}50`,
          transition: "width 0.8s cubic-bezier(0.16,1,0.3,1), background 0.5s ease",
        }} />
      </div>
    </div>
  );
}

// ─── REDEMPTION MODE OVERLAY ───
function RedemptionMode({ state, setState, th }) {
  const spiritTasks = [
    { id: "redeem_bible", label: "Read a Bible Chapter", hp: 25 },
    { id: "redeem_prayer", label: "15 Minutes of Prayer", hp: 25 },
    { id: "redeem_worship", label: "10 Minutes of Worship", hp: 25 },
    { id: "redeem_psalm", label: "Read a Psalm Aloud", hp: 25 },
  ];

  const completed = state.redemptionCompleted || {};
  const totalRecovered = Object.values(completed).filter(Boolean).length * 25;

  const toggleRedeem = (id, hpVal) => {
    setState(p => {
      const was = p.redemptionCompleted?.[id];
      const newCompleted = { ...p.redemptionCompleted, [id]: !was };
      const newHp = Math.min(HP_MAX, p.hp + (was ? -hpVal : hpVal));
      const allDone = Object.values(newCompleted).filter(Boolean).length >= 4;
      if (!was) playTick();
      return {
        ...p,
        hp: newHp,
        redemptionCompleted: newCompleted,
        redemptionMode: allDone ? false : true,
      };
    });
  };

  return (
    <div style={{
      position: "fixed", top: 0, left: 0, right: 0, bottom: 0, zIndex: 1000,
      background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center",
      backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)",
    }}>
      <div style={{
        maxWidth: 400, width: "90%", padding: "32px 28px", borderRadius: 20,
        background: th === dark ? "#111827" : "#FFFFFF",
        border: `1px solid ${th.red}40`, boxShadow: `0 0 60px ${th.red}20`,
      }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>{"\u271E"}</div>
          <h2 style={{ fontSize: 18, fontWeight: 800, color: th.red, margin: "0 0 8px", letterSpacing: "-0.02em", fontFamily: FONT }}>
            REDEMPTION MODE
          </h2>
          <p style={{ fontSize: 12, color: th.mid, margin: 0, fontFamily: FONT, lineHeight: 1.5 }}>
            Your HP has fallen to 0. Complete these spirit tasks to restore your strength and return to battle.
          </p>
        </div>

        <div style={{ marginBottom: 20 }}>
          <HealthBar hp={state.hp} th={th} />
        </div>

        {spiritTasks.map(t => {
          const done = completed[t.id];
          return (
            <div key={t.id} onClick={() => toggleRedeem(t.id, t.hp)} style={{
              display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "14px 16px", borderRadius: 12, marginBottom: 8, cursor: "pointer",
              background: done ? `${th.blue}10` : th.glass,
              border: `1px solid ${done ? th.blue + "30" : th.glassBorder}`,
              transition: "all 0.25s ease",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{
                  width: 22, height: 22, borderRadius: 6, flexShrink: 0,
                  border: `1.5px solid ${done ? th.blue : th.dim}`,
                  background: done ? th.blue : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  {done && <span style={{ color: th.check, fontSize: 12, fontWeight: 800 }}>{"\u2713"}</span>}
                </div>
                <span style={{ fontSize: 13, fontWeight: 500, color: done ? th.dim : th.text, fontFamily: FONT,
                  textDecoration: done ? "line-through" : "none" }}>{t.label}</span>
              </div>
              <span style={{ fontSize: 11, fontWeight: 700, color: done ? "#22C55E" : th.ghost, fontFamily: FONT }}>+{t.hp} HP</span>
            </div>
          );
        })}

        <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: th.dim, fontFamily: FONT }}>
          {totalRecovered >= 100 ? "HP fully restored! Returning to battle..." : `${totalRecovered}/100 HP recovered`}
        </div>
      </div>
    </div>
  );
}

// ─── ACCOUNTABILITY MODAL ───
function AccountabilityModal({ state, dayPct, dayXp, level, th, onClose }) {
  const [partners, setPartners] = useState(() => {
    try { return JSON.parse(localStorage.getItem("pva_accountability") || "[]"); } catch { return []; }
  });
  const [newName, setNewName] = useState("");
  const [newContact, setNewContact] = useState("");
  const [sent, setSent] = useState(null);

  const savePartners = (p) => { setPartners(p); localStorage.setItem("pva_accountability", JSON.stringify(p)); };
  const addPartner = () => {
    if (!newName.trim()) return;
    savePartners([...partners, { name: newName.trim(), contact: newContact.trim(), id: Date.now() }]);
    setNewName(""); setNewContact("");
  };
  const removePartner = (id) => savePartners(partners.filter(p => p.id !== id));

  const tasks = state.customTasks || DEFAULT_TASKS;
  const allTasks = Object.entries(tasks).flatMap(([cat, c]) => c.sections.flatMap(s => s.tasks.map(t => ({ ...t, cat, section: s.name }))));
  const completed = allTasks.filter(t => t.type === "check" ? state.done?.[t.id] : (state.counters?.[t.id] || 0) >= (t.target || 1));

  const generateReport = () => {
    const date = new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    return `PVA Accountability Report - ${date}\n\n` +
      `Progress: ${Math.round(dayPct)}% | XP: ${dayXp} | Stage: ${level.name}\n` +
      `Tasks completed: ${completed.length}/${allTasks.length}\n\n` +
      `Completed:\n${completed.map(t => `  \u2713 ${t.label}`).join("\n") || "  (none yet)"}\n\n` +
      `Remaining:\n${allTasks.filter(t => !completed.find(c => c.id === t.id)).map(t => `  \u25CB ${t.label}`).join("\n") || "  All done!"}`;
  };

  const sendReport = (partner) => {
    const report = generateReport();
    if (partner.contact && partner.contact.includes("@")) {
      window.open(`mailto:${partner.contact}?subject=PVA Accountability Report&body=${encodeURIComponent(report)}`);
    } else {
      navigator.clipboard.writeText(report).then(() => {});
    }
    setSent(partner.id);
    setTimeout(() => setSent(null), 2000);
  };

  const overlayStyle = { position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999, padding: 20 };
  const cardStyle = { background: th.bg, borderRadius: 20, padding: 24, maxWidth: 400, width: "100%", maxHeight: "80vh", overflowY: "auto", border: `1px solid ${th.glassBorder}`, fontFamily: FONT };
  const inputStyle = { width: "100%", padding: "8px 12px", borderRadius: 10, border: `1px solid ${th.glassBorder}`, background: th.glass, color: th.text, fontSize: 12, fontFamily: FONT, outline: "none", boxSizing: "border-box" };
  const btnStyle = { padding: "6px 14px", borderRadius: 10, border: `1px solid ${th.glassBorder}`, background: th.glass, color: th.mid, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT };

  return (
    <div style={overlayStyle} onClick={onClose}>
      <div style={cardStyle} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <span style={{ fontSize: 14, fontWeight: 800, color: th.text, letterSpacing: "0.06em" }}>ACCOUNTABILITY</span>
          <button onClick={onClose} style={{ ...btnStyle, padding: "4px 10px" }}>{"\u2715"}</button>
        </div>

        {/* Progress Summary */}
        <div style={{ background: th.glass, borderRadius: 12, padding: 14, marginBottom: 16, border: `1px solid ${th.glassBorder}` }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: th.ghost, letterSpacing: "0.1em", marginBottom: 8 }}>TODAY{"\u2019"}S PROGRESS</div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 28, fontWeight: 800, color: th.text }}>{Math.round(dayPct)}%</span>
            <span style={{ fontSize: 11, color: th.dim }}>{completed.length}/{allTasks.length} tasks</span>
          </div>
          <div style={{ height: 4, borderRadius: 2, background: th.ghost, marginTop: 8, overflow: "hidden" }}>
            <div style={{ height: "100%", borderRadius: 2, width: `${dayPct}%`, background: dayPct >= 80 ? th.green : dayPct >= 50 ? th.blue : th.red, transition: "width 0.6s ease" }} />
          </div>
        </div>

        {/* Partners List */}
        <div style={{ fontSize: 10, fontWeight: 700, color: th.ghost, letterSpacing: "0.1em", marginBottom: 8 }}>ACCOUNTABILITY PARTNERS</div>
        {partners.length === 0 && (
          <div style={{ fontSize: 11, color: th.dim, marginBottom: 12, fontStyle: "normal" }}>No partners added yet. Add someone to keep you on track!</div>
        )}
        {partners.map(p => (
          <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, padding: "8px 12px", borderRadius: 10, background: th.glass, border: `1px solid ${th.glassBorder}` }}>
            <div style={{ width: 28, height: 28, borderRadius: 14, background: th.blueDim, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, color: th.blue }}>{p.name[0].toUpperCase()}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: th.text }}>{p.name}</div>
              {p.contact && <div style={{ fontSize: 10, color: th.dim }}>{p.contact}</div>}
            </div>
            <button onClick={() => sendReport(p)} style={{ ...btnStyle, background: sent === p.id ? th.greenDim : th.blueDim, color: sent === p.id ? th.green : th.blue, border: `1px solid ${sent === p.id ? th.green + "40" : th.blue + "40"}` }}>
              {sent === p.id ? "\u2713 SENT" : "SEND"}
            </button>
            <button onClick={() => removePartner(p.id)} style={{ ...btnStyle, padding: "4px 8px", color: th.red, fontSize: 10 }}>{"\u2715"}</button>
          </div>
        ))}

        {/* Add Partner */}
        <div style={{ marginTop: 12, padding: 12, borderRadius: 12, background: th.glass, border: `1px solid ${th.glassBorder}` }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: th.ghost, letterSpacing: "0.1em", marginBottom: 8 }}>ADD PARTNER</div>
          <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Name" style={{ ...inputStyle, marginBottom: 6 }} />
          <input value={newContact} onChange={e => setNewContact(e.target.value)} placeholder="Email (optional)" style={{ ...inputStyle, marginBottom: 8 }} />
          <button onClick={addPartner} style={{ ...btnStyle, width: "100%", textAlign: "center", background: th.blueDim, color: th.blue, border: `1px solid ${th.blue}30` }}>ADD PARTNER</button>
        </div>

        {/* Copy Report */}
        <button onClick={() => { navigator.clipboard.writeText(generateReport()); setSent("clipboard"); setTimeout(() => setSent(null), 2000); }} style={{ ...btnStyle, width: "100%", marginTop: 12, textAlign: "center", padding: "10px 14px" }}>
          {sent === "clipboard" ? "\u2713 COPIED TO CLIPBOARD" : "COPY REPORT TO CLIPBOARD"}
        </button>
      </div>
    </div>
  );
}

// ─── COMPONENTS ───
function Bar({ value, max, color, h = 4, th }) {
  const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
  return (
    <div style={{ width: "100%", height: h, borderRadius: h/2, background: th.ghost, overflow: "hidden" }}>
      <div className="pva-bar-shimmer" style={{ height: "100%", borderRadius: h/2, width: `${pct}%`,
        background: `linear-gradient(90deg, ${color}, ${color}CC, ${color})`,
        backgroundSize: "200% 100%",
        boxShadow: `0 0 16px ${color}40`, transition: "width 0.8s cubic-bezier(0.16,1,0.3,1)" }} />
    </div>
  );
}

function TimerButton({ taskId, state, setState, th }) {
  const { running, toggle, reset, fmt } = useTimer(taskId, state, setState);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 6 }}>
      <span style={{ fontSize: 11, fontFamily: FONT, fontWeight: 600, color: running ? th.blue : th.dim, minWidth: 44 }}>{fmt}</span>
      <button onClick={(e) => { e.stopPropagation(); toggle(); }} style={{
        padding: "2px 8px", borderRadius: 6, border: `1px solid ${running ? th.red+"40" : th.blue+"30"}`,
        background: running ? th.redDim : th.blueDim, color: running ? th.red : th.blue,
        fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
      }}>{running ? "STOP" : "START"}</button>
      {!running && state.timers?.[taskId] > 0 && (
        <button onClick={(e) => { e.stopPropagation(); reset(); }} style={{
          padding: "2px 6px", borderRadius: 6, border: `1px solid ${th.ghost}`, background: "transparent",
          color: th.dim, fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: FONT,
        }}>RST</button>
      )}
    </div>
  );
}

// ─── EDITABLE TASK ───
function Task({ task, done, counter, note, onToggle, onCount, onNote, onEdit, onDelete, mult, accent, th, state, setState }) {
  const xp = Math.round(task.xp * mult);
  const isDone = task.type === "check" ? done : (counter || 0) >= (task.target || 1);
  const [showNotes, setShowNotes] = useState(false);
  const [editing, setEditing] = useState(false);
  const [editLabel, setEditLabel] = useState(task.label);
  const [showMenu, setShowMenu] = useState(false);

  const saveEdit = () => {
    if (editLabel.trim() && editLabel !== task.label) {
      onEdit(task.id, editLabel.trim());
    }
    setEditing(false);
  };

  return (
    <div style={{ marginBottom: 6 }}>
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "12px 14px", borderRadius: 12, cursor: "pointer",
        background: isDone ? `${accent}08` : "transparent",
        border: `1px solid ${isDone ? `${accent}20` : th.ghost}`,
        transition: "all 0.25s ease",
      }}>
        <div onClick={() => { if (task.type === "check" && !editing) { onToggle(task.id); playTick(); }}}
          style={{ display: "flex", alignItems: "center", gap: 12, flex: 1, minWidth: 0 }}>
          <div style={{
            width: 20, height: 20, borderRadius: 6, flexShrink: 0,
            border: `1.5px solid ${isDone ? accent : th.dim}`,
            background: isDone ? accent : "transparent",
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all 0.25s ease", boxShadow: isDone ? `0 0 12px ${accent}30` : "none",
          }}>
            {isDone && <span style={{ color: th.check, fontSize: 11, fontWeight: 800 }}>{"\u2713"}</span>}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            {editing ? (
              <input value={editLabel} onChange={e => setEditLabel(e.target.value)}
                onBlur={saveEdit} onKeyDown={e => { if(e.key === "Enter") saveEdit(); if(e.key === "Escape") setEditing(false); }}
                autoFocus onClick={e => e.stopPropagation()}
                style={{
                  width: "100%", fontSize: 13, fontWeight: 500, color: th.text, fontFamily: FONT,
                  background: "transparent", border: `1px solid ${th.blue}40`, borderRadius: 6,
                  padding: "4px 8px", outline: "none",
                }} />
            ) : (
              <div style={{ fontSize: 13, fontWeight: 500, color: isDone ? th.dim : th.mid,
                textDecoration: isDone ? "line-through" : "none", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
              }}>{task.label}</div>
            )}
            {task.type === "counter" && !editing && (
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
                <button onClick={e => { e.stopPropagation(); onCount(task.id, -10); }} style={{
                  width: 26, height: 26, borderRadius: 6, border: `1px solid ${th.glassBorder}`,
                  background: th.glass, color: th.mid, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
                }}>{"\u2212"}</button>
                <span style={{ fontSize: 12, fontWeight: 600, color: th.mid }}>{counter||0}<span style={{ color: th.dim }}>/{task.target}</span></span>
                <button onClick={e => { e.stopPropagation(); onCount(task.id, 10); }} style={{
                  width: 26, height: 26, borderRadius: 6, border: `1px solid ${accent}30`,
                  background: `${accent}10`, color: accent, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: FONT,
                }}>+</button>
              </div>
            )}
            {!editing && <TimerButton taskId={task.id} state={state} setState={setState} th={th} />}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0, marginLeft: 8 }}>
          {task.hasNotes && !editing && (
            <button onClick={e => { e.stopPropagation(); setShowNotes(!showNotes); }} style={{
              width: 24, height: 24, borderRadius: 6, border: `1px solid ${note ? accent+"40" : th.ghost}`,
              background: note ? `${accent}10` : "transparent", color: note ? accent : th.dim,
              fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            }}>{"\u270E"}</button>
          )}
          {!editing && (
            <div style={{ position: "relative" }}>
              <button onClick={e => { e.stopPropagation(); setShowMenu(!showMenu); }} style={{
                width: 24, height: 24, borderRadius: 6, border: `1px solid ${th.ghost}`,
                background: "transparent", color: th.dim, fontSize: 14, cursor: "pointer",
                display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT,
              }}>{"\u22EE"}</button>
              {showMenu && (
                <div style={{
                  position: "absolute", right: 0, top: 28, zIndex: 50,
                  background: th === dark ? "#1F2937" : "#FFFFFF", borderRadius: 10,
                  border: `1px solid ${th.glassBorder}`, boxShadow: "0 8px 30px rgba(0,0,0,0.2)",
                  overflow: "hidden", minWidth: 120,
                }}>
                  <div onClick={e => { e.stopPropagation(); setShowMenu(false); setEditing(true); setEditLabel(task.label); }} style={{
                    padding: "10px 14px", fontSize: 12, color: th.text, cursor: "pointer", fontFamily: FONT,
                    borderBottom: `1px solid ${th.ghost}`,
                  }}>Rename</div>
                  <div onClick={e => { e.stopPropagation(); setShowMenu(false);
                    if(confirm(`Delete "${task.label}"?`)) onDelete(task.id);
                  }} style={{
                    padding: "10px 14px", fontSize: 12, color: th.red, cursor: "pointer", fontFamily: FONT,
                  }}>Delete</div>
                </div>
              )}
            </div>
          )}
          <div style={{ fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 20,
            background: isDone ? `${accent}15` : th === dark ? "rgba(255,255,255,0.03)" : "rgba(0,0,0,0.03)",
            color: isDone ? accent : th.ghost,
          }}>+{xp}</div>
        </div>
      </div>
      {showNotes && task.hasNotes && (
        <textarea value={note || ""} onChange={e => onNote(task.id, e.target.value)}
          placeholder={task.notesPlaceholder || "Notes..."}
          onClick={e => e.stopPropagation()}
          style={{
            width: "100%", boxSizing: "border-box", marginTop: 4, padding: "10px 14px",
            borderRadius: 10, border: `1px solid ${th.glassBorder}`, background: th.glass,
            color: th.text, fontFamily: FONT, fontSize: 12, resize: "vertical", minHeight: 60,
            outline: "none",
          }} />
      )}
    </div>
  );
}

function Category({ catKey, cat, state, setState, mult, expanded, onExpand, th, colors, onEditTask, onDeleteTask, onAddTask }) {
  const c = colors[catKey];
  const all = cat.sections.flatMap(s => s.tasks);
  const doneN = all.filter(t => t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1)).length;
  const pct = all.length > 0 ? Math.round((doneN / all.length) * 100) : 0;

  const onToggle = useCallback(id => {
    setState(p => {
      const t = all.find(x => x.id === id); const was = p.completed[id];
      const dx = t ? Math.round(t.xp * mult) : 0;
      const newCompleted = { ...p.completed, [id]: !was };
      const secDone = cat.sections.some(sec => sec.tasks.every(tk =>
        tk.type === "check" ? newCompleted[tk.id] : (p.counters[tk.id]||0) >= (tk.target||1)
      ) && sec.tasks.some(tk => tk.id === id));
      if (secDone && !was) setTimeout(playCelebrate, 100);
      return { ...p, completed: newCompleted, xp: p.xp + (was ? -dx : dx), totalXp: p.totalXp + (was ? -dx : dx) };
    });
  }, [mult, cat, all]);

  const onCount = useCallback((id, delta) => {
    setState(p => {
      const t = all.find(x => x.id === id); const old = p.counters[id]||0;
      const nv = Math.max(0, Math.min(old + delta, t?.target||100));
      const wasDone = old >= (t?.target||1), isDone = nv >= (t?.target||1);
      const dx = t ? Math.round(t.xp * mult) : 0;
      let xd = 0; if (!wasDone && isDone) { xd = dx; playTick(); } if (wasDone && !isDone) xd = -dx;
      return { ...p, counters: { ...p.counters, [id]: nv }, xp: p.xp + xd, totalXp: p.totalXp + xd };
    });
  }, [mult, all]);

  const onNote = useCallback((id, val) => {
    setState(p => ({ ...p, notes: { ...p.notes, [id]: val } }));
  }, []);

  return (
    <div style={{
      borderRadius: 16, overflow: "hidden", marginBottom: 10,
      background: expanded ? `${c.accent}06` : th.glass,
      border: `1px solid ${expanded ? c.border : th.glassBorder}`,
      backdropFilter: "blur(24px)", WebkitBackdropFilter: "blur(24px)",
      transition: "all 0.4s cubic-bezier(0.16,1,0.3,1)",
      boxShadow: expanded ? `0 0 40px ${c.accent}10` : "none",
    }}>
      <div onClick={() => onExpand(catKey)} style={{
        padding: "18px 20px", cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{
            width: 36, height: 36, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center",
            background: c.dim, border: `1px solid ${c.border}`,
            fontSize: 11, fontWeight: 700, color: c.accent, letterSpacing: "0.04em",
          }}>{"P" + (Object.keys(colors).indexOf(catKey) + 1)}</div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, color: th.text, letterSpacing: "-0.02em" }}>{cat.label}</div>
            <div style={{ fontSize: 11, color: th.dim, letterSpacing: "0.03em", marginTop: 2 }}>{cat.subtitle}</div>
          </div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: pct === 100 ? c.accent : th.mid, letterSpacing: "-0.04em" }}>{pct}%</div>
          <div style={{ fontSize: 10, color: th.dim }}>{doneN}/{all.length}</div>
        </div>
      </div>
      {expanded && (
        <div style={{ padding: "0 20px 18px" }}>
          <Bar value={doneN} max={all.length} color={c.accent} h={3} th={th} />
          {cat.sections.map((sec, secIdx) => (
            <div key={sec.name} style={{ marginTop: 18 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, padding: "0 4px" }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.12em" }}>{sec.name}</span>
                <span style={{ fontSize: 10, color: th.ghost }}>{sec.time}</span>
              </div>
              {sec.tasks.map(task => (
                <Task key={task.id} task={task} done={state.completed[task.id]} counter={state.counters[task.id]}
                  note={state.notes?.[task.id]} onToggle={onToggle} onCount={onCount} onNote={onNote}
                  onEdit={(id, newLabel) => onEditTask(catKey, secIdx, id, newLabel)}
                  onDelete={(id) => onDeleteTask(catKey, secIdx, id)}
                  mult={mult} accent={c.accent} th={th} state={state} setState={setState} />
              ))}
              <AddTaskButton onAdd={(label) => onAddTask(catKey, secIdx, label)} th={th} />
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── WEEKLY VIEW ───
function WeeklyView({ state, th, tasks, boss }) {
  const hist = state.history || [];
  const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const catKeys = ["person","people","process","product"];
  const catLabels = { person: "Person", people: "People", process: "Process", product: "Product" };
  const allTasks = Object.values(tasks).flatMap(c => c.sections.flatMap(s => s.tasks));
  const notDone = allTasks.filter(t => t.type === "check" ? !state.completed[t.id] : (state.counters[t.id]||0) < (t.target||1));

  const bossDefeated = boss.check(hist, state);

  return (
    <div style={{ marginBottom: 20 }}>
      {/* Boss Battle */}
      <BossBattleCard boss={boss} completed={bossDefeated || state.bossCompleted} th={th} />

      {/* Heatmap */}
      <div style={{ ...glassStyle(th), padding: "16px 20px", marginBottom: 10 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: th.dim, letterSpacing: "0.1em", marginBottom: 12 }}>7-DAY HEATMAP</div>
        <div style={{ display: "flex", gap: 6, justifyContent: "space-between" }}>
          {hist.map((d, i) => {
            const pct = d?.pct || 0;
            const opacity = Math.max(0.15, pct / 100);
            const isToday = d?.date === TODAY;
            return (
              <div key={i} style={{ flex: 1, textAlign: "center" }}>
                <div style={{
                  height: 36, borderRadius: 8,
                  background: pct === 100 ? th.blue : pct > 0 ? `${th.blue}` : th.ghost,
                  opacity: pct === 100 ? 1 : opacity,
                  border: isToday ? `2px solid ${th.blue}` : `1px solid ${th.ghost}`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 10, fontWeight: 700, color: pct > 50 ? "#fff" : th.mid,
                }}>{pct > 0 ? `${pct}%` : "\u2013"}</div>
                <div style={{ fontSize: 9, color: isToday ? th.blue : th.dim, marginTop: 4, fontWeight: isToday ? 700 : 400 }}>
                  {days[(new Date(d?.date || TODAY).getDay() + 6) % 7]}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Category Breakdown */}
      <div style={{ ...glassStyle(th), padding: "16px 20px", marginBottom: 10 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: th.dim, letterSpacing: "0.1em", marginBottom: 12 }}>CATEGORY BREAKDOWN (TODAY)</div>
        {catKeys.map(k => {
          const all = tasks[k].sections.flatMap(s => s.tasks);
          const done = all.filter(t => t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1)).length;
          const pct = all.length > 0 ? Math.round((done / all.length) * 100) : 0;
          return (
            <div key={k} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontSize: 11, fontWeight: 600, color: th.mid }}>{catLabels[k]}</span>
                <span style={{ fontSize: 11, color: th.dim }}>{pct}%</span>
              </div>
              <Bar value={done} max={all.length} color={k === "product" ? th.red : th.blue} h={4} th={th} />
            </div>
          );
        })}
      </div>

      {/* Missed Tasks */}
      {notDone.length > 0 && (
        <div style={{ ...glassStyle(th), padding: "16px 20px", borderColor: `${th.red}20` }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: th.red, letterSpacing: "0.1em", marginBottom: 10 }}>
            {"\u26A0"} INCOMPLETE ({notDone.length})
          </div>
          {notDone.slice(0, 8).map(t => (
            <div key={t.id} style={{ fontSize: 12, color: th.dim, padding: "4px 0", borderBottom: `1px solid ${th.ghost}` }}>
              {t.label}
            </div>
          ))}
          {notDone.length > 8 && <div style={{ fontSize: 11, color: th.ghost, marginTop: 6 }}>+{notDone.length - 8} more</div>}
        </div>
      )}
    </div>
  );
}

const glassStyle = (th) => ({
  background: th.glass, border: `1px solid ${th.glassBorder}`,
  borderRadius: 18, backdropFilter: "blur(24px)", WebkitBackdropFilter: "blur(24px)",
  boxShadow: "0 4px 24px rgba(0,0,0,0.08), 0 1.5px 6px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.06)",
});

// ─── MAIN ───
// ─── HUMAN AVATAR (Level-Aware with Gear) ───
const AVATAR_GEAR = [
  { name: "Seed", armor: null, weapon: null, helmet: null, auraColor: null, bodyColor: null },
  { name: "Sprout", armor: null, weapon: null, helmet: null, auraColor: "#86EFAC", bodyColor: "#22C55E" },
  { name: "Sapling", armor: "#A7F3D0", weapon: null, helmet: null, auraColor: "#34D399", bodyColor: "#059669" },
  { name: "Warrior", armor: "#CBD5E1", weapon: "#94A3B8", helmet: "#94A3B8", auraColor: "#3B82F6", bodyColor: "#64748B" },
  { name: "Guardian", armor: "#93C5FD", weapon: "#60A5FA", helmet: "#3B82F6", auraColor: "#2563EB", bodyColor: "#1E40AF" },
  { name: "Champion", armor: "#FDE68A", weapon: "#FBBF24", helmet: "#F59E0B", auraColor: "#F59E0B", bodyColor: "#D97706" },
  { name: "Commander", armor: "#C084FC", weapon: "#A855F7", helmet: "#9333EA", auraColor: "#7C3AED", bodyColor: "#6D28D9" },
  { name: "Legend", armor: "#FCA5A5", weapon: "#EF4444", helmet: "#DC2626", auraColor: "#EF4444", bodyColor: "#B91C1C" },
  { name: "Overcomer", armor: "#FEF08A", weapon: "#FFD700", helmet: "#FFD700", auraColor: "#FFD700", bodyColor: "#FFD700" },
];

function HumanAvatar({ pct, th, levelIdx }) {
  const isDark = th === dark;
  const glowStrength = Math.max(0.05, pct / 100);
  const gear = AVATAR_GEAR[Math.min(levelIdx || 0, AVATAR_GEAR.length - 1)];
  const baseColor = gear.bodyColor || (isDark ? "#E5E7EB" : "#374151");
  const glowColor = gear.auraColor || (pct >= 80 ? "#3B82F6" : pct >= 50 ? "#60A5FA" : isDark ? "#6B7280" : "#9CA3AF");
  const auraColor = gear.auraColor || (pct >= 90 ? "#F59E0B" : pct >= 60 ? "#3B82F6" : "transparent");
  const auraOpacity = (levelIdx >= 1 || pct >= 60) ? Math.max(glowStrength * 0.5, 0.2) : 0;
  const idx = levelIdx || 0;

  return (
    <svg viewBox="0 0 60 80" width="52" height="70">
      <defs>
        <radialGradient id="avatarGlow" cx="50%" cy="40%" r="50%">
          <stop offset="0%" stopColor={glowColor} stopOpacity={glowStrength * 0.7} />
          <stop offset="70%" stopColor={glowColor} stopOpacity={glowStrength * 0.2} />
          <stop offset="100%" stopColor={glowColor} stopOpacity="0" />
        </radialGradient>
        <filter id="avatarBlur">
          <feGaussianBlur stdDeviation={2 + glowStrength * 4} result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>
      {/* Aura / outer glow */}
      {auraOpacity > 0 && (
        <ellipse cx="30" cy="40" rx={24 + glowStrength * 6} ry={34 + glowStrength * 6}
          fill="none" stroke={auraColor} strokeWidth={idx >= 6 ? 2.5 : 1.5} opacity={auraOpacity}>

// ─── TASK VIEW (inside a category) ───
function TaskView({ catKey, cat, state, setState, mult, th, colors, onBack, onEditTask, onDeleteTask, onAddTask, dailyChallenge, challengeCompleted, toggleChallenge }) {
  const c = colors[catKey];
  const all = cat.sections.flatMap(s => s.tasks);
  const doneN = all.filter(t => t.type === "check" ? state.completed[t.id] : (state.counters[t.id]||0) >= (t.target||1)).length;
  const pct = all.length > 0 ? Math.round((doneN / all.length) * 100) : 0;
  const catIndex = ["person","people","process","product"].indexOf(catKey);

  const onToggle = useCallback(id => {
    setState(p => {
      const t = all.find(x => x.id === id); const was = p.completed[id];
      const dx = t ? Math.round(t.xp * mult) : 0;
      const newCompleted = { ...p.completed, [id]: !was };
      const secDone = cat.sections.some(sec => sec.tasks.every(tk =>
        tk.type === "check" ? newCompleted[tk.id] : (p.counters[tk.id]||0) >= (tk.target||1)
      ) && sec.tasks.some(tk => tk.id === id));
      if (secDone && !was) setTimeout(playCelebrate, 100);
      return { ...p, completed: newCompleted, xp: p.xp + (was ? -dx : dx), totalXp: p.totalXp + (was ? -dx : dx) };
    });
  }, [mult, cat, all]);

  const onCount = useCallback((id, delta) => {
    setState(p => {
      const t = all.find(x => x.id === id); const old = p.counters[id]||0;
      const nv = Math.max(0, Math.min(old + delta, t?.target||100));
      const wasDone = old >= (t?.target||1), isDone = nv >= (t?.target||1);
      const dx = t ? Math.round(t.xp * mult) : 0;
      let xd = 0; if (!wasDone && isDone) { xd = dx; playTick(); } if (wasDone && !isDone) xd = -dx;
      return { ...p, counters: { ...p.counters, [id]: nv }, xp: p.xp + xd, totalXp: p.totalXp + xd };
    });
  }, [mult, all]);

  const onNote = useCallback((id, val) => {
    setState(p => ({ ...p, notes: { ...p.notes, [id]: val } }));
  }, []);

  return (
    <div style={{ padding: "0 20px 40px" }}>
      {/* Back button + header */}
      <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "24px 0 16px" }}>
        <button onClick={onBack} style={{
          width: 40, height: 40, borderRadius: 12, cursor: "pointer",
          border: `1px solid ${th.glassBorder}`, background: th.glass,
          backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
          color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: FONT,
        }}>{"\u2190"}</button>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: c.accent, letterSpacing: "0.1em",
              padding: "3px 10px", borderRadius: 12, background: `${c.accent}15`,
            }}>P{catIndex + 1}</span>
            <span style={{ fontSize: 20, fontWeight: 800, color: th.text, letterSpacing: "-0.03em" }}>{cat.label}</span>
          </div>
          <div style={{ fontSize: 11, color: th.dim, marginTop: 2 }}>{cat.subtitle}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 26, fontWeight: 800, color: pct === 100 ? c.accent : th.mid }}>{pct}%</div>
          <div style={{ fontSize: 10, color: th.dim }}>{doneN}/{all.length}</div>
        </div>
      </div>

      {/* Health bar */}
      <div style={{ ...glassStyle(th), padding: "12px 18px", marginBottom: 12 }}>
        <HealthBar hp={state.hp} th={th} />
      </div>

      {/* Daily challenge */}
      <DailyChallengeCard challenge={dailyChallenge} completed={challengeCompleted} onToggle={toggleChallenge} th={th} />

      {/* Progress bar */}
      <div style={{ ...glassStyle(th), padding: "14px 18px", marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
          <span style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.08em" }}>PROGRESS</span>
          <span style={{ fontSize: 10, color: th.dim }}>{doneN}/{all.length}</span>
        </div>
        <Bar value={doneN} max={all.length} color={pct === 100 ? th.red : c.accent} h={5} th={th} />
        {pct === 100 && (
          <div style={{ marginTop: 10, padding: "8px 0", borderRadius: 8, textAlign: "center",
            background: th.redDim, border: `1px solid ${th.red}20` }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: th.red, letterSpacing: "0.06em" }}>
              {"\u2726"} SECTION COMPLETE {"\u2726"}
            </span>
          </div>
        )}
      </div>

      {/* Sections and tasks */}
      {cat.sections.map((sec, secIdx) => (
        <div key={sec.name} style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, padding: "0 4px" }}>
            <span style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.12em" }}>{sec.name}</span>
            <span style={{ fontSize: 10, color: th.ghost }}>{sec.time}</span>
          </div>
          {sec.tasks.map(task => (
            <Task key={task.id} task={task} done={state.completed[task.id]} counter={state.counters[task.id]}
              note={state.notes?.[task.id]} onToggle={onToggle} onCount={onCount} onNote={onNote}
              onEdit={(id, newLabel) => onEditTask(catKey, secIdx, id, newLabel)}
              onDelete={(id) => onDeleteTask(catKey, secIdx, id)}
              mult={mult} accent={c.accent} th={th} state={state} setState={setState} />
          ))}
          <AddTaskButton onAdd={(label) => onAddTask(catKey, secIdx, label)} th={th} />
        </div>
      ))}
    </div>
  );
}

          <div key={s.label} style={{ ...glassStyle(th), padding: "14px 0", textAlign: "center" }}>

          </div>
        ))}
      </div>
    </div>
  );
}

// ─── NETWORK OF INTERCESSION ───
const DEFAULT_PRAYER_PEOPLE = [
  { id: "p1", name: "Family", prayed: false },
  { id: "p2", name: "Church leaders", prayed: false },
  { id: "p3", name: "Friends", prayed: false },
  { id: "p4", name: "Colleagues", prayed: false },
  { id: "p5", name: "Nations", prayed: false },
];

function IntercessionView({ state, setState, th, onBack }) {
  const isDark = th === dark;
  const people = state.prayerPeople || DEFAULT_PRAYER_PEOPLE;
  const prayedCount = people.filter(p => p.prayed).length;

  const togglePrayed = (id) => {
    setState(p => {
      const pp = (p.prayerPeople || DEFAULT_PRAYER_PEOPLE).map(person =>
        person.id === id ? { ...person, prayed: !person.prayed } : person
      );
      return { ...p, prayerPeople: pp };
    });
  };

  const addPerson = (name) => {
    setState(p => {
      const pp = [...(p.prayerPeople || DEFAULT_PRAYER_PEOPLE)];
      pp.push({ id: `pray_${Date.now()}`, name, prayed: false });
      return { ...p, prayerPeople: pp };
    });
  };

  const removePerson = (id) => {
    setState(p => {
      const pp = (p.prayerPeople || DEFAULT_PRAYER_PEOPLE).filter(person => person.id !== id);
      return { ...p, prayerPeople: pp };
    });
  };

  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState("");

  // Network visualization: place people in a circle
  const centerX = 150, centerY = 120, radius = 80;

  return (
    <div style={{ padding: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 24 }}>
        <button onClick={onBack} style={{
          width: 40, height: 40, borderRadius: 12, cursor: "pointer",
          border: `1px solid ${th.glassBorder}`, background: th.glass,
          color: th.text, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: FONT, backdropFilter: "blur(20px)",
        }}>{"\u2190"}</button>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: th.text, letterSpacing: "-0.03em" }}>Network of Intercession</div>
          <div style={{ fontSize: 10, color: th.dim }}>{prayedCount}/{people.length} prayed for today</div>
        </div>
      </div>

      {/* Network visualization */}
      <div style={{ ...glassStyle(th), padding: "20px 16px", marginBottom: 16 }}>
        <svg viewBox="0 0 300 240" width="100%" style={{ display: "block", margin: "0 auto", maxWidth: 400 }}>
          <defs>
            <radialGradient id="prayerGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor={th.gold} stopOpacity="0.4" />
              <stop offset="100%" stopColor={th.gold} stopOpacity="0" />
            </radialGradient>
          </defs>
          {/* Center cross */}
          <line x1={centerX} y1={centerY - 16} x2={centerX} y2={centerY + 16} stroke={th.gold} strokeWidth="2.5" strokeLinecap="round" opacity="0.6" />
          <line x1={centerX - 10} y1={centerY - 6} x2={centerX + 10} y2={centerY - 6} stroke={th.gold} strokeWidth="2.5" strokeLinecap="round" opacity="0.6" />
          {/* Connection lines to each person */}
          {people.map((p, i) => {
            const angle = (i / people.length) * Math.PI * 2 - Math.PI / 2;
            const px = centerX + Math.cos(angle) * radius;
            const py = centerY + Math.sin(angle) * radius;
            return (
              <line key={`line-${p.id}`} x1={centerX} y1={centerY} x2={px} y2={py}
                stroke={p.prayed ? th.gold : th.dim} strokeWidth={p.prayed ? 1.5 : 0.8}
                opacity={p.prayed ? 0.6 : 0.2} strokeDasharray={p.prayed ? "none" : "3,3"}>
                {p.prayed && <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite" />}
              </line>
            );
          })}
          {/* Person nodes */}
          {people.map((p, i) => {
            const angle = (i / people.length) * Math.PI * 2 - Math.PI / 2;
            const px = centerX + Math.cos(angle) * radius;
            const py = centerY + Math.sin(angle) * radius;
            return (
              <g key={p.id}>
                {p.prayed && (
                  <circle cx={px} cy={py} r="18" fill="url(#prayerGlow)">
                    <animate attributeName="r" values="15;20;15" dur="3s" repeatCount="indefinite" />
                  </circle>
                )}
                <circle cx={px} cy={py} r="10" fill={p.prayed ? th.gold : isDark ? "#374151" : "#D1D5DB"}
                  opacity={p.prayed ? 0.9 : 0.5} />
                {/* Simple human icon inside */}
                <circle cx={px} cy={py - 3} r="2.5" fill={p.prayed ? (isDark ? "#050508" : "#fff") : th.dim} />
                <line x1={px} y1={py} x2={px} y2={py + 4} stroke={p.prayed ? (isDark ? "#050508" : "#fff") : th.dim}
                  strokeWidth="1.5" strokeLinecap="round" />

      {/* Prayer list */}
      <div style={{ fontSize: 10, fontWeight: 700, color: th.dim, letterSpacing: "0.12em", marginBottom: 10 }}>PRAYER LIST</div>
      {people.map(p => (

          display: "flex", alignItems: "center", justifyContent: "space-between",

            }}>

            </div>

      {/* Add person */}
      {adding ? (
        <div style={{ display: "flex", gap: 6, marginTop: 8 }}>

const NOTES_KEY = "pva_notes";
function loadNotes() {
  try {
    const raw = JSON.parse(localStorage.getItem(NOTES_KEY) || "null");
    if (raw && raw.folders) return raw;
  } catch {}
  return { folders: [{ id: "general", name: "General", icon: "\u{1F4DD}" }], notes: [] };
}
function saveNotes(n) {
  try { localStorage.setItem(NOTES_KEY, JSON.stringify(n)); } catch {}
}

function NotesView({ th, onBack }) {
  const [data, setData] = useState(loadNotes);

  const addFolder = () => {
    if (!newFolderName.trim()) return;
    const id = newFolderName.trim().toLowerCase().replace(/[^a-z0-9]+/g, "_") + "_" + Date.now();
    const next = { ...data, folders: [...data.folders, { id, name: newFolderName.trim(), icon: "\u{1F4C1}" }] };

    persist(next); setActiveFolder(null);
  };

  const addNote = (folderId) => {
    const note = { id: "note_" + Date.now(), folderId, title: "", body: "", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };

// ─── ROUTINE PARSER ───
function parseRoutineText(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 0);
  const items = [];
  for (const line of lines) {
    const m = line.match(/^[\*\-\u2022]?\s*(\d{1,2}[:\.]?\d{0,2})\s*[\u2013\-to]+\s*(\d{1,2}[:\.]?\d{0,2})\s*[\u2013\-:]*\s*(.+)$/i)
           || line.match(/^[\*\-\u2022]?\s*(\d{1,2}[:\.]?\d{0,2})\s*[\u2013\-:]+\s*(.+)$/i);
    if (m) {
      const startRaw = m[1].replace(".", ":"); const endRaw = m[2] ? (m[3] ? m[2].replace(".", ":") : null) : null;
      const label = m[3] || m[2]; const startT = startRaw.includes(":") ? startRaw : startRaw + ":00";
      const endT = endRaw ? (endRaw.includes(":") ? endRaw : endRaw + ":00") : null;
      const time = endT ? startT + "\u2013" + endT : startT;
      const id = label.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "").slice(0, 40);
      items.push({ id: id + "_" + items.length, label: label.trim(), time, xp: 15, type: "check" });
    } else if (line.length > 2) {
      const id = line.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "").slice(0, 40);
      items.push({ id: id + "_" + items.length, label: line, time: "Flexible", xp: 15, type: "check" });
    }
  }
  return items;
}

function buildTasksFromRoutine(items) {
  const cats = { person: [], people: [], process: [], product: [] };
  const personKw = ["pray", "prayer", "secret place", "exercise", "workout", "meal", "eat", "meditat", "worship", "fast", "walk", "altar", "intercession", "courts", "declarations", "get ready", "wake", "sleep", "bible", "devotion"];
  const peopleKw = ["family", "call", "mentor", "community", "friend", "fellowship"];
  const processKw = ["brief", "meeting", "work", "phd", "study", "read", "admin", "email", "office", "report", "prep"];
  const productKw = ["course", "create", "build", "write", "design", "content", "music", "project", "improv", "develop"];
  for (const item of items) {
    const low = item.label.toLowerCase();
    if (peopleKw.some(k => low.includes(k))) cats.people.push(item);
    else if (productKw.some(k => low.includes(k))) cats.product.push(item);
    else if (processKw.some(k => low.includes(k))) cats.process.push(item);
    else cats.person.push(item);
  }
  return {
    person: { label: "Person", subtitle: "Spirit \u2192 Soul \u2192 Body", sections: cats.person.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) },
    people: { label: "People", subtitle: "Family & Community", sections: cats.people.length > 0 ? cats.people.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) : [{ name: "CONNECTIONS", time: "Flexible", tasks: [{ id: "people_connect", label: "Connect with someone", xp: 10, type: "check" }] }] },
    process: { label: "Process", subtitle: "Systems & Workflows", sections: cats.process.length > 0 ? cats.process.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) : [{ name: "SYSTEMS", time: "Flexible", tasks: [{ id: "process_task", label: "Work on systems", xp: 15, type: "check" }] }] },
    product: { label: "Product", subtitle: "Output & Creation", sections: cats.product.length > 0 ? cats.product.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) : [{ name: "CREATE", time: "Flexible", tasks: [{ id: "product_task", label: "Create something", xp: 15, type: "check" }] }] },
  };
}

// ─── ROUTINE BUILDER (guided questions) ───
function GuidedRoutineBuilder({ onFinish, th }) {
  const [qStep, setQStep] = useState(0);
  const [answers, setAnswers] = useState({
    wakeTime: "05:00", sleepTime: "23:00",
    // Person
    devotional: true, devotionalParts: [], exercise: true, exerciseType: "general",
    prayers: [], meals: 2, declarations: false, meditation: true,
    // People
    familyTime: false, familyTimeSlot: "19:00", fellowship: false, fellowshipDay: "sunday",
    mentoring: false, peopleTasks: "",
    // Process
    workStart: "09:00", workEnd: "17:00", workTasks: "", studying: false, studyTopic: "", studyTime: "1",
    sideTasks: "",
    // Product
    productTasks: "", creativeTime: "afternoon",
  });
  const set = (k, v) => setAnswers(p => ({ ...p, [k]: v }));
  const toggleArr = (k, val) => set(k, answers[k].includes(val) ? answers[k].filter(x => x !== val) : [...answers[k], val]);

  const inputStyle = { width: "100%", padding: "14px 18px", borderRadius: 12, marginBottom: 12, border: `1px solid ${th.blue}30`, background: th.glass, color: th.text, fontSize: 14, fontWeight: 600, fontFamily: FONT, outline: "none", textAlign: "center", backdropFilter: "blur(20px)" };
  const btnStyle = (active) => ({ width: "100%", padding: "14px", borderRadius: 12, border: `1px solid ${active ? th.blue + "40" : th.ghost}`, background: active ? th.blueDim : th.glass, color: active ? th.blue : th.ghost, fontSize: 13, fontWeight: 700, cursor: active ? "pointer" : "default", fontFamily: FONT, letterSpacing: "0.04em", transition: "all 0.25s ease" });
  const smallBtn = (active, onClick, label) => (<button key={label} onClick={onClick} style={{ padding: "10px 16px", borderRadius: 10, border: `1px solid ${active ? th.blue : th.glassBorder}`, background: active ? th.blueDim : th.glass, color: active ? th.blue : th.dim, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT, transition: "all 0.2s ease" }}>{label}</button>);
  const sectionLabel = (text, color) => (<div style={{ fontSize: 9, fontWeight: 800, color: color || th.dim, letterSpacing: "0.16em", marginBottom: 6, marginTop: 4 }}>{text}</div>);

  const pad2 = (n) => (n < 10 ? "0" : "") + n;
  const addHour = (t, h) => { const hr = parseInt(t.split(":")[0]) + h; return pad2(Math.min(hr, 23)) + ":" + t.split(":")[1]; };
  const subHour = (t, h) => { const hr = parseInt(t.split(":")[0]) - h; return pad2(Math.max(hr, 0)) + ":" + t.split(":")[1]; };

  const buildFromAnswers = () => {
    const person = [], people = [], process = [], product = [];
    let uid = 0;
    const mk = (time, label, xp, opts) => ({ id: label.toLowerCase().replace(/[^a-z0-9]+/g, "_").slice(0, 35) + "_" + (uid++), label, time, xp: xp || 15, type: "check", ...(opts || {}) });

    // ─── PERSON ───
    if (answers.devotional) {
      const parts = answers.devotionalParts;
      const devLabel = parts.length > 0 ? "Secret Place: " + parts.map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(", ") : "Secret Place: Seeking His Face";
      person.push(mk(answers.wakeTime + "\u2013" + addHour(answers.wakeTime, 1), devLabel, 30, { hasNotes: true, notesPlaceholder: "What did the Lord reveal today?" }));
    }
    if (answers.exercise) {
      const exStart = answers.devotional ? addHour(answers.wakeTime, 1) : answers.wakeTime;
      const typeLabel = answers.exerciseType === "general" ? "Exercise" : answers.exerciseType.charAt(0).toUpperCase() + answers.exerciseType.slice(1);
      person.push(mk(exStart + "\u2013" + addHour(exStart, 1), typeLabel, 20));
    }
    if (answers.prayers.includes("morning")) person.push(mk("09:00\u201309:15", "Morning Prayer", 15));
    for (let i = 1; i <= answers.meals; i++) {
      const mealTimes = { 1: "11:00\u201311:15", 2: "14:00\u201315:00", 3: "18:00\u201318:30" };
      person.push(mk(mealTimes[i] || "Flexible", "Meal " + i, 5));
    }
    if (answers.prayers.includes("midday")) person.push(mk("12:00\u201312:15", "Midday Prayer", 15));
    if (answers.prayers.includes("afternoon")) person.push(mk("15:00\u201315:15", "Afternoon Prayer", 15));
    if (answers.declarations) person.push(mk("15:15\u201316:00", "Declarations Walk", 20));
    if (answers.prayers.includes("evening")) person.push(mk("19:00\u201319:15", "Evening Prayer", 15));
    if (answers.meditation) person.push(mk(subHour(answers.sleepTime, 1) + "\u2013" + subHour(answers.sleepTime, 0.5).split(":").map((v,i) => i===1 ? "30" : v).join(":"), "Meditation & Reflection", 20));
    person.push(mk(subHour(answers.sleepTime, 0), "Wind Down & Sleep", 5));

    // ─── PEOPLE ───
    if (answers.familyTime) people.push(mk(answers.familyTimeSlot + "\u201300:00", "Family Check-in", 15));
    if (answers.fellowship) people.push(mk("Flexible", "Fellowship / Community (" + answers.fellowshipDay.charAt(0).toUpperCase() + answers.fellowshipDay.slice(1) + ")", 15));
    if (answers.mentoring) people.push(mk("Flexible", "Mentoring / Discipleship", 15));
    if (answers.peopleTasks.trim()) {
      answers.peopleTasks.split(",").map(t => t.trim()).filter(Boolean).forEach(t => {
        people.push(mk("Flexible", t, 15));
      });
    }
    if (people.length === 0) people.push(mk("Flexible", "Connect with someone today", 10));

    // ─── PROCESS ───
    if (answers.workTasks.trim()) {
      answers.workTasks.split(",").map(t => t.trim()).filter(Boolean).forEach(t => {
        process.push(mk(answers.workStart + "\u2013" + answers.workEnd, t, 25));
      });
    }
    if (answers.studying) {
      const studyLabel = answers.studyTopic.trim() ? answers.studyTopic.trim() : "Study / Academic Work";
      process.push(mk("Flexible", studyLabel, 25, { hasNotes: true, notesPlaceholder: "What did you work on?" }));
    }
    if (answers.sideTasks.trim()) {
      answers.sideTasks.split(",").map(t => t.trim()).filter(Boolean).forEach(t => {
        process.push(mk("Flexible", t, 25, { hasNotes: true }));
      });
    }
    if (process.length === 0) process.push(mk(answers.workStart + "\u2013" + answers.workEnd, "Work Block", 20));

    // ─── PRODUCT ───
    if (answers.productTasks.trim()) {
      answers.productTasks.split(",").map(t => t.trim()).filter(Boolean).forEach(t => {
        product.push(mk("Flexible", t, 20));
      });
    }
    if (product.length === 0) product.push(mk("Flexible", "Create something today", 15));

    return {
      person: { label: "Person", subtitle: "Spirit \u2192 Soul \u2192 Body", sections: person.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) },
      people: { label: "People", subtitle: "Family & Community", sections: people.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) },
      process: { label: "Process", subtitle: "Systems & Workflows", sections: process.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) },
      product: { label: "Product", subtitle: "Output & Creation", sections: product.map(t => ({ name: t.label.toUpperCase().slice(0, 30), time: t.time, tasks: [t] })) },
    };
  };

  const questions = [
    // ─── PERSON: Spirit, Soul, Body ───
    { pillar: "PERSON", title: "What time do you wake up?", sub: "This anchors your entire day", render: () => (
      <input type="time" value={answers.wakeTime} onChange={e => set("wakeTime", e.target.value)} style={inputStyle} />
    )},
    { pillar: "PERSON", title: "Do you have a morning devotional or quiet time?", sub: "Time with God to start the day", render: () => (
      <div>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginBottom: 16 }}>
          {smallBtn(answers.devotional, () => set("devotional", true), "YES")}
          {smallBtn(!answers.devotional, () => set("devotional", false), "NO")}
        </div>
        {answers.devotional && (
          <div>
            {sectionLabel("WHAT DOES IT INCLUDE?")}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
              {["bible reading", "prayer", "worship", "journaling"].map(p =>
                smallBtn(answers.devotionalParts.includes(p), () => toggleArr("devotionalParts", p), p.charAt(0).toUpperCase() + p.slice(1))
              )}
            </div>
          </div>
        )}
      </div>
    )},
    { pillar: "PERSON", title: "Do you exercise?", sub: "Physical training for the body", render: () => (
      <div>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginBottom: 16 }}>
          {smallBtn(answers.exercise, () => set("exercise", true), "YES")}
          {smallBtn(!answers.exercise, () => set("exercise", false), "NO")}
        </div>
        {answers.exercise && (
          <div>
            {sectionLabel("WHAT TYPE?")}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
              {[["general", "General"], ["gym", "Gym"], ["running", "Running"], ["home workout", "Home Workout"], ["walking", "Walking"], ["sports", "Sports"]].map(([val, lbl]) =>
                smallBtn(answers.exerciseType === val, () => set("exerciseType", val), lbl)
              )}
            </div>
          </div>
        )}
      </div>
    )},
    { pillar: "PERSON", title: "Which prayer times do you keep?", sub: "Select all that apply", render: () => (
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
        {["morning", "midday", "afternoon", "evening"].map(p =>
          smallBtn(answers.prayers.includes(p), () => toggleArr("prayers", p), p.charAt(0).toUpperCase() + p.slice(1))
        )}
      </div>
    )},
    { pillar: "PERSON", title: "Do you speak daily declarations or confessions?", sub: "Words of faith spoken over your life", render: () => (
      <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
        {smallBtn(answers.declarations, () => set("declarations", true), "YES")}
        {smallBtn(!answers.declarations, () => set("declarations", false), "NO")}
      </div>
    )},
    { pillar: "PERSON", title: "How many meals per day?", sub: "Nourishing the body", render: () => (
      <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
        {[1, 2, 3].map(n => smallBtn(answers.meals === n, () => set("meals", n), n + " meal" + (n > 1 ? "s" : "")))}
      </div>
    )},
    { pillar: "PERSON", title: "Do you have an evening meditation or reflection time?", sub: "Winding down the day with intention", render: () => (
      <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
        {smallBtn(answers.meditation, () => set("meditation", true), "YES")}
        {smallBtn(!answers.meditation, () => set("meditation", false), "NO")}
      </div>
    )},
    { pillar: "PERSON", title: "What time do you sleep?", sub: "Rest completes the cycle", render: () => (
      <input type="time" value={answers.sleepTime} onChange={e => set("sleepTime", e.target.value)} style={inputStyle} />
    )},

    // ─── PEOPLE: Family & Community ───
    { pillar: "PEOPLE", title: "Do you have a regular time to connect with family?", sub: "A call, dinner, or check-in with loved ones", render: () => (
      <div>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginBottom: 16 }}>
          {smallBtn(answers.familyTime, () => set("familyTime", true), "YES")}
          {smallBtn(!answers.familyTime, () => set("familyTime", false), "NO")}
        </div>
        {answers.familyTime && (
          <div>
            {sectionLabel("WHAT TIME?")}
            <input type="time" value={answers.familyTimeSlot} onChange={e => set("familyTimeSlot", e.target.value)} style={inputStyle} />
          </div>
        )}
      </div>
    )},
    { pillar: "PEOPLE", title: "Are you part of any fellowship or community gathering?", sub: "Small group, Bible study, church community", render: () => (
      <div>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginBottom: 16 }}>
          {smallBtn(answers.fellowship, () => set("fellowship", true), "YES")}
          {smallBtn(!answers.fellowship, () => set("fellowship", false), "NO")}
        </div>
        {answers.fellowship && (
          <div>
            {sectionLabel("WHICH DAY?")}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
              {["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"].map(d =>
                smallBtn(answers.fellowshipDay === d, () => set("fellowshipDay", d), d.charAt(0).toUpperCase() + d.slice(1, 3))
              )}
            </div>
          </div>
        )}
      </div>
    )},
    { pillar: "PEOPLE", title: "Do you mentor or disciple anyone?", sub: "Investing in someone else\u2019s growth", render: () => (
      <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
        {smallBtn(answers.mentoring, () => set("mentoring", true), "YES")}
        {smallBtn(!answers.mentoring, () => set("mentoring", false), "NO")}
      </div>
    )},
    { pillar: "PEOPLE", title: "Any other people commitments?", sub: "Separate with commas (e.g. Prayer Altar, Accountability Call)", render: () => (
      <input value={answers.peopleTasks} onChange={e => set("peopleTasks", e.target.value)} placeholder="Prayer Altar, Accountability Call..." style={{ ...inputStyle, textAlign: "left" }} />
    )},

    // ─── PROCESS: Systems & Workflows ───
    { pillar: "PROCESS", title: "What are your work hours?", sub: "Your main professional block", render: () => (
      <div style={{ display: "flex", gap: 12, alignItems: "center", justifyContent: "center" }}>
        <input type="time" value={answers.workStart} onChange={e => set("workStart", e.target.value)} style={{ ...inputStyle, width: "45%" }} />
        <span style={{ color: th.dim }}>to</span>
        <input type="time" value={answers.workEnd} onChange={e => set("workEnd", e.target.value)} style={{ ...inputStyle, width: "45%" }} />
      </div>
    )},
    { pillar: "PROCESS", title: "What are your main professional tasks?", sub: "Separate with commas (e.g. Briefs, Reports, Meetings)", render: () => (
      <input value={answers.workTasks} onChange={e => set("workTasks", e.target.value)} placeholder="Briefs, Reports, Meetings..." style={{ ...inputStyle, textAlign: "left" }} />
    )},
    { pillar: "PROCESS", title: "Are you studying or doing academic work?", sub: "PhD, coursework, research, exams", render: () => (
      <div>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginBottom: 16 }}>
          {smallBtn(answers.studying, () => set("studying", true), "YES")}
          {smallBtn(!answers.studying, () => set("studying", false), "NO")}
        </div>
        {answers.studying && (
          <div>
            {sectionLabel("WHAT ARE YOU STUDYING?")}
            <input value={answers.studyTopic} onChange={e => set("studyTopic", e.target.value)} placeholder="PhD Prep, Thesis Writing, Exam Revision..." style={{ ...inputStyle, textAlign: "left" }} />
          </div>
        )}
      </div>
    )},
    { pillar: "PROCESS", title: "Any side projects or organisations you work on?", sub: "Separate with commas (e.g. IDEG, Church Admin, Non-profit)", render: () => (
      <input value={answers.sideTasks} onChange={e => set("sideTasks", e.target.value)} placeholder="IDEG, Church Admin, Non-profit..." style={{ ...inputStyle, textAlign: "left" }} />
    )},

    // ─── PRODUCT: Output & Creation ───
    { pillar: "PRODUCT", title: "What do you create or produce?", sub: "Courses, content, apps, writing, music, designs", render: () => (
      <input value={answers.productTasks} onChange={e => set("productTasks", e.target.value)} placeholder="Courses, Blog Posts, App Development..." style={{ ...inputStyle, textAlign: "left" }} />
    )},
  ];

  const q = questions[qStep];
  const isLast = qStep === questions.length - 1;
  const pillarColors = { PERSON: th.red || "#EF4444", PEOPLE: "#A855F7", PROCESS: th.green || "#16A34A", PRODUCT: th.blue || "#3B82F6" };

  return (
    <div style={{ textAlign: "center" }}>
      <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 12, marginBottom: 20 }}>
        <div style={{ fontSize: 9, fontWeight: 800, color: pillarColors[q.pillar] || th.dim, letterSpacing: "0.16em", padding: "4px 12px", borderRadius: 8, background: (pillarColors[q.pillar] || th.dim) + "15", border: `1px solid ${(pillarColors[q.pillar] || th.dim)}30` }}>{q.pillar}</div>
        <div style={{ fontSize: 10, color: th.dim, letterSpacing: "0.14em" }}>STEP {qStep + 1} OF {questions.length}</div>
      </div>
      <h2 style={{ fontSize: 20, fontWeight: 800, color: th.text, letterSpacing: "-0.03em", marginBottom: 8 }}>{q.title}</h2>
      <p style={{ fontSize: 12, color: th.dim, marginBottom: 28 }}>{q.sub}</p>
      {q.render()}
      <div style={{ display: "flex", gap: 12, marginTop: 20 }}>
        {qStep > 0 && <button onClick={() => setQStep(qStep - 1)} style={{ ...btnStyle(true), flex: 1 }}>BACK</button>}
        <button onClick={() => { if (isLast) { onFinish(buildFromAnswers()); } else { setQStep(qStep + 1); } }} style={{ ...btnStyle(true), flex: 1 }}>{isLast ? "BUILD MY ROUTINE" : "NEXT"}</button>
      </div>
      {/* Progress dots */}
      <div style={{ display: "flex", justifyContent: "center", gap: 4, marginTop: 16 }}>
        {questions.map((qq, i) => (
          <div key={i} style={{ width: i === qStep ? 16 : 6, height: 6, borderRadius: 3, background: i <= qStep ? (pillarColors[qq.pillar] || th.blue) : th.ghost, transition: "all 0.3s ease" }} />
        ))}
      </div>
    </div>
  );
}

// ─── FREE TEXT ROUTINE BUILDER ───
function FreeTextRoutineBuilder({ onFinish, th }) {
  const [text, setText] = useState("");
  const inputStyle = { width: "100%", padding: "14px 18px", borderRadius: 12, marginBottom: 12, border: `1px solid ${th.blue}30`, background: th.glass, color: th.text, fontSize: 12, fontWeight: 500, fontFamily: FONT, outline: "none", textAlign: "left", backdropFilter: "blur(20px)", minHeight: 200, resize: "vertical", lineHeight: 1.8 };
  const placeholder = "Paste your routine here, e.g.:\n\n05:00-06:00 - Secret Place\n06:00-07:00 - Exercise\n09:00-11:00 - Work briefs\n12:00-12:15 - Prayer\n13:00-14:00 - Create content";
  const parsed = parseRoutineText(text);
  return (
    <div style={{ textAlign: "center" }}>
      <h2 style={{ fontSize: 20, fontWeight: 800, color: th.text, letterSpacing: "-0.03em", marginBottom: 8 }}>Paste Your Routine</h2>
      <p style={{ fontSize: 12, color: th.dim, marginBottom: 20 }}>One task per line with times (e.g. 09:00-11:00 - Task Name)</p>
      <textarea value={text} onChange={e => setText(e.target.value)} placeholder={placeholder} style={inputStyle} />
      {parsed.length > 0 && (
        <div style={{ fontSize: 11, color: th.mid, marginBottom: 12 }}>{parsed.length} task{parsed.length !== 1 ? "s" : ""} detected</div>
      )}
      <button onClick={() => { if (parsed.length > 0) onFinish(buildTasksFromRoutine(parsed)); }} disabled={parsed.length === 0} style={{
        width: "100%", padding: "14px", borderRadius: 12,
        border: `1px solid ${parsed.length > 0 ? th.blue + "40" : th.ghost}`,
        background: parsed.length > 0 ? th.blueDim : th.glass,
        color: parsed.length > 0 ? th.blue : th.ghost,
        fontSize: 13, fontWeight: 700, cursor: parsed.length > 0 ? "pointer" : "default",
        fontFamily: FONT, letterSpacing: "0.04em", transition: "all 0.25s ease",
      }}>BUILD MY ROUTINE</button>
    </div>
  );
}

// ─── ONBOARDING SCREEN ───
function OnboardingScreen({ onComplete, onCustomTasks }) {
  const [name, setName] = useState("");
  const [step, setStep] = useState(0);
  const [routineMode, setRoutineMode] = useState(null);
  const th = getAutoTheme() === "dark" ? dark : light;

  const doCompleteName = () => {
    if (name.trim()) setStep(2);
  };

  const doFinish = (customTasks) => {
    if (name.trim()) {
      const profile = { name: name.trim(), createdAt: TODAY };
      saveProfile(profile);
      onCustomTasks(customTasks);
      onComplete(profile);
    }
  };

  const doSkip = () => {
    if (name.trim()) {
      const profile = { name: name.trim(), createdAt: TODAY };
      saveProfile(profile);
      onComplete(profile);
    }
  };

  return (
    <div style={{
      minHeight: "100vh", fontFamily: FONT, color: th.text, background: th.grad,
      display: "flex", alignItems: "center", justifyContent: "center",
    }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap');`}</style>
      <div style={{ maxWidth: 420, width: "90%", textAlign: "center", padding: "40px 0" }}>
        {step === 0 && (
          <>
            <h1 style={{ fontSize: 32, fontWeight: 800, color: th.text, letterSpacing: "-0.04em", marginBottom: 8 }}>PVA</h1>
            <p style={{ fontSize: 12, color: th.dim, letterSpacing: "0.12em", marginBottom: 40 }}>
              PERSON {"\u00B7"} VEHICLE {"\u00B7"} ASSIGNMENT
            </p>
            <div style={{
              padding: "24px 28px", borderRadius: 16, marginBottom: 24,

// ─── DAILY READINESS SCORE ───
function getReadinessScore(state, dayPct) {
  const streakScore = Math.min(state.streak || 0, 30) / 30 * 25;
  const hpScore = (state.hp || 0) / HP_MAX * 25;
  const completionScore = dayPct / 100 * 30;
  const consistencyScore = (() => {
    const hist = (state.history || []).slice(-7);
    if (hist.length === 0) return 10;
    const avg = hist.reduce((s, d) => s + (d?.pct || 0), 0) / hist.length;
    return avg / 100 * 20;
  })();
  return Math.round(Math.min(100, streakScore + hpScore + completionScore + consistencyScore));
}
function getReadinessMessage(score) {
  if (score >= 85) return "You\u2019re on fire \u2014 push hard today!";
  if (score >= 70) return "Strong foundation \u2014 keep building.";
  if (score >= 50) return "Steady \u2014 focus on the essentials.";
  if (score >= 30) return "Regroup \u2014 start with what matters most.";
  return "Rest and reset \u2014 tomorrow is a new day.";
}
function getReadinessColor(score, th) {
  if (score >= 80) return "#22C55E";
  if (score >= 60) return th.blue;
  if (score >= 40) return th.gold;
  return th.red;
}

// ─── READINESS SCORE CARD ───

  const score = getReadinessScore(state, dayPct);
  const msg = getReadinessMessage(score);

  const circumference = 2 * Math.PI * 38;
  const offset = circumference - (score / 100) * circumference;
